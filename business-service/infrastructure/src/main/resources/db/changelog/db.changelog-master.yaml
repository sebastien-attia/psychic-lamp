# Business Service master changelog — owns the `boatapp` database
# (APP_USER, BOATS, BOAT_AUDIT). Changesets are included in dependency order:
# APP_USER first, because BOAT_AUDIT carries a FK to it.
databaseChangeLog:
  - include:
      file: db/changelog/changes/001-create-app-user-table.yaml
  - include:
      file: db/changelog/changes/002-create-boats-table.yaml
  - include:
      file: db/changelog/changes/003-create-boat-audit-table.yaml
