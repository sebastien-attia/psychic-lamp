---
# Bootstrap per-database roles on the Azure PostgreSQL Flexible Server.
#
# Run ONCE per environment (idempotent — safe to re-run). Creates three
# application roles (bff, business_service, keycloak), transfers ownership
# of each application database to its role, and revokes PUBLIC CONNECT so
# roles cannot reach each other's data.
#
# Network reachability — runner MUST be inside the VNet.
# The Flexible Server is VNet-integrated with private access only. We
# explicitly reject the transient public-allowlist pattern (briefly opening
# the server's network ACL and closing it after migrations) because every
# open-then-close window is a detection-evasion surface and contradicts the
# deny-by-default posture applied to Key Vault.
#
# The `postgres-admin-password` is read from Key Vault directly here so this
# playbook is independently runnable (no dependency on app-config role facts).

- name: Bootstrap per-DB roles on Azure PostgreSQL Flexible Server
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "../vault/secrets.yml"
  tasks:
    - name: Ensure terraform_outputs is loaded (allow standalone invocation)
      when: terraform_outputs is not defined
      block:
        - name: Load Terraform outputs
          ansible.builtin.command:
            cmd: "terraform -chdir={{ playbook_dir }}/../../terraform output -json"
          register: tf_out_local
          changed_when: false

        - name: Register terraform_outputs fact
          ansible.builtin.set_fact:
            terraform_outputs: "{{ tf_out_local.stdout | from_json }}"

    - name: Read postgres-admin-password from Key Vault (private endpoint)
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "https://{{ keyvault_name }}.vault.azure.net"
        name: postgres-admin-password
        auth_source: cli
      register: pg_admin_lookup
      no_log: true

    - name: Materialize postgres admin password
      ansible.builtin.set_fact:
        pg_admin_password: "{{ pg_admin_lookup.secrets[0].secret }}"
      no_log: true

    - name: Create per-DB application roles with LOGIN attribute
      community.postgresql.postgresql_user:
        login_host: "{{ postgres_fqdn }}"
        login_user: "{{ postgres_admin_username }}"
        login_password: "{{ pg_admin_password }}"
        db: postgres
        name: "{{ item.name }}"
        password: "{{ item.password }}"
        role_attr_flags: LOGIN
        # Plaintext password comparison would re-issue ALTER ROLE on every
        # run; on_create keeps the play idempotent. Rotation lives in a
        # separate flow that explicitly sets update_password=always.
        update_password: on_create
      loop:
        - { name: bff,              password: "{{ vault_bff_db_password }}" }
        - { name: business_service, password: "{{ vault_business_db_password }}" }
        - { name: keycloak,         password: "{{ vault_keycloak_db_password }}" }
      loop_control:
        label: "{{ item.name }}"
      no_log: true

    - name: Transfer database ownership to per-service roles
      community.postgresql.postgresql_owner:
        login_host: "{{ postgres_fqdn }}"
        login_user: "{{ postgres_admin_username }}"
        login_password: "{{ pg_admin_password }}"
        db: postgres
        new_owner: "{{ item.owner }}"
        obj_name: "{{ item.db }}"
        obj_type: database
      loop:
        - { db: bff_session, owner: bff }
        - { db: boatapp,     owner: business_service }
        - { db: keycloak,    owner: keycloak }
      loop_control:
        label: "{{ item.db }} → {{ item.owner }}"
      no_log: true

    - name: Revoke PUBLIC CONNECT on each application database
      community.postgresql.postgresql_privs:
        login_host: "{{ postgres_fqdn }}"
        login_user: "{{ postgres_admin_username }}"
        login_password: "{{ pg_admin_password }}"
        db: "{{ item }}"
        type: database
        privs: CONNECT
        roles: PUBLIC
        state: absent
      loop:
        - bff_session
        - boatapp
        - keycloak
      no_log: true

    - name: Grant CONNECT to each database's owner role
      community.postgresql.postgresql_privs:
        login_host: "{{ postgres_fqdn }}"
        login_user: "{{ postgres_admin_username }}"
        login_password: "{{ pg_admin_password }}"
        db: "{{ item.db }}"
        type: database
        privs: CONNECT
        roles: "{{ item.role }}"
      loop:
        - { db: bff_session, role: bff }
        - { db: boatapp,     role: business_service }
        - { db: keycloak,    role: keycloak }
      loop_control:
        label: "{{ item.db }} → {{ item.role }}"
      no_log: true
