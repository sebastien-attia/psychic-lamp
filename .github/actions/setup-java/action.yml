# .github/actions/setup-java/action.yml
#
# Composite action that installs Temurin JDK 25 and primes the Maven
# dependency cache. Used by every CI/deploy job that runs `./mvnw`.
#
# Why a composite action: the same three steps (setup-java + cache-key
# computation + cache restore) recur across the bff, business-service and
# Dependency-Track-upload jobs. Centralising them keeps the JDK version,
# the cache path and the cache-key strategy in one place.
#
# Inputs: none — Java version is pinned to match the project (CLAUDE.md
# specifies Java 25). If a future phase needs a parameter, add it here
# rather than letting individual workflows drift.

name: 'Setup Java (Temurin 25) + Maven cache'
description: 'Installs Temurin JDK 25 and restores the ~/.m2 Maven cache.'

runs:
  using: composite
  steps:
    # Pinned to a 40-char commit SHA — `# v4` is the human-readable tag
    # that Dependabot's `package-ecosystem: github-actions` updater
    # rewrites when a new release lands.
    - name: Setup Temurin JDK 25
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: temurin
        java-version: '25'

    # Cache key bound to every pom.xml in the repo (both modules).
    # Restore-keys give a partial-hit fallback when only one module's
    # pom changed.
    - name: Cache Maven local repository
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
