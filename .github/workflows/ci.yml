# .github/workflows/ci.yml
#
# Continuous integration for the Boat App.
#
# Triggers
#   - push to `main`, `staging`, or any `feature/**` branch
#   - pull_request targeting `main` or `staging`
#   - workflow_call from deploy-staging.yml / deploy-production.yml
#     (so deploy workflows reuse this exact pipeline rather than copying
#     half of it)
#
# Jobs
#   lint                    Frontend type-check (vue-tsc). No backend lint
#                           step: spotless is not wired in either pom.xml,
#                           and SpotBugs+FindSecBugs already gate `mvn verify`
#                           in build-bff / build-business-service.
#   sca-scan                Software composition analysis via OSV-Scanner
#                           across all lockfiles; fails on HIGH+CRITICAL.
#   build-bff               `./mvnw verify` for bff (Testcontainers Keycloak
#                           + WireMock + SpotBugs+FindSecBugs SAST), then
#                           `./mvnw package` to emit target/bom.{json,xml}.
#   build-business-service  Same shape for business-service (Testcontainers
#                           Postgres + ArchUnit + SAST + SBOM).
#   build-frontend          `npm run type-check && npm run test && npm run
#                           build`. Vitest + vue-tsc.
#   docker-build            Sanity-build both Dockerfiles end-to-end on the
#                           runner; tags `ci-<sha>` only — does NOT push.
#   e2e-tests               Boots the local-intg compose stack and runs
#                           Playwright against the BFF.
#
# Workflows that re-use this via `workflow_call:` are responsible for any
# additional environment/permissions context they need (for example
# `id-token: write` for OIDC); this file only declares what the checks
# themselves need.

name: CI

on:
  push:
    branches: [main, staging, 'feature/**']
  pull_request:
    branches: [main, staging]
  workflow_call: {}

# Least-privilege defaults. Individual jobs can widen with their own
# `permissions:` block if needed (none currently do).
permissions:
  contents: read

# Cancel in-flight runs for the same branch when a new push lands; saves
# minutes on busy feature branches. Deploy workflows opt OUT of cancellation
# at their own concurrency group.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # Frontend type-check (vue-tsc). The closest thing to a lint we have.
    # Job ID `lint` is the check display name — required by branch
    # protection in .github/settings.yml, which matches contexts against
    # check display names. Do not add a `name:` override here without
    # also updating settings.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-node
      # `vue-tsc --noEmit` is the closest thing to a lint the frontend has
      # today (no .eslintrc, no `lint` script in package.json). Type errors
      # block CI; style is handled at edit time by the project's Prettier
      # PostToolUse hook.
      - name: Type-check frontend
        working-directory: frontend
        run: |
          npm ci
          npm run type-check

  sca-scan:
    # SCA — OSV-Scanner. Job ID is the required-status-check name in settings.yml.
    # Reusable workflow form pinned to a tagged release (no @main). Scans
    # bff/pom.xml, business-service/pom.xml and frontend/package-lock.json
    # in one pass via --recursive. `--fail-on-vuln=HIGH` makes the gate
    # block on HIGH+CRITICAL; MEDIUM still surfaces in the report but
    # does not fail the job.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      scan-args: |-
        --recursive
        --fail-on-vuln=HIGH
        ./

  build-bff:
    # Java build + unit/integration tests + SAST + CycloneDX SBOM for the BFF module.
    # Job ID is the required-status-check name in settings.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-java
      # `verify` runs unit + integration tests (Testcontainers Keycloak +
      # WireMock) AND SpotBugs+FindSecBugs SAST. `package` afterwards
      # emits the CycloneDX BOM into target/bom.{json,xml}; we run it
      # with -DskipTests so we don't re-execute the test suite.
      - name: Maven verify (tests + SAST)
        working-directory: bff
        run: ./mvnw -B -ntp verify
      - name: Maven package (CycloneDX SBOM)
        working-directory: bff
        run: ./mvnw -B -ntp -DskipTests package
      # Pre-deploy Dependency-Track gate: upload the BOM, wait for analysis,
      # fail the run on any unsuppressed FAIL-severity policy violation. The
      # post-deploy DT receipt step in deploy-*.yml is preserved separately
      # so DT records both "what we tried to ship" and "what we actually ran".
      # Skipped silently when DTRACK_PROJECT_UUID_STAGING is unset (e.g. in a
      # fresh fork before the operator wires the project).
      - name: Dependency-Track gate (bff)
        if: ${{ vars.DTRACK_PROJECT_UUID_STAGING != '' }}
        uses: ./.github/actions/dtrack-gate
        with:
          dtrack-url:     ${{ secrets.DTRACK_URL }}
          dtrack-api-key: ${{ secrets.DTRACK_API_KEY }}
          project-uuid:   ${{ vars.DTRACK_PROJECT_UUID_STAGING }}
          bom-path:       bff/target/bom.json
          fail-on:        FAIL
      - name: Upload bff test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bff-test-reports
          path: |
            bff/target/surefire-reports/
            bff/target/failsafe-reports/
            bff/target/site/jacoco/
            bff/target/spotbugsXml.xml
          if-no-files-found: ignore
      - name: Upload bff CycloneDX SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bff-sbom
          path: |
            bff/target/bom.json
            bff/target/bom.xml
          if-no-files-found: error

  build-business-service:
    # Java build + unit/integration tests + ArchUnit + SAST + CycloneDX SBOM.
    # Job ID is the required-status-check name in settings.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-java
      - name: Maven verify (tests + ArchUnit + SAST)
        working-directory: business-service
        run: ./mvnw -B -ntp verify
      - name: Maven package (CycloneDX SBOM)
        working-directory: business-service
        run: ./mvnw -B -ntp -DskipTests package
      # Pre-deploy DT gate — see build-bff above for rationale.
      - name: Dependency-Track gate (business-service)
        if: ${{ vars.DTRACK_PROJECT_UUID_STAGING != '' }}
        uses: ./.github/actions/dtrack-gate
        with:
          dtrack-url:     ${{ secrets.DTRACK_URL }}
          dtrack-api-key: ${{ secrets.DTRACK_API_KEY }}
          project-uuid:   ${{ vars.DTRACK_PROJECT_UUID_STAGING }}
          bom-path:       business-service/target/bom.json
          fail-on:        FAIL
      - name: Upload business-service test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: business-service-test-reports
          path: |
            business-service/target/surefire-reports/
            business-service/target/failsafe-reports/
            business-service/target/site/jacoco/
            business-service/target/spotbugsXml.xml
          if-no-files-found: ignore
      - name: Upload business-service CycloneDX SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: business-service-sbom
          path: |
            business-service/target/bom.json
            business-service/target/bom.xml
          if-no-files-found: error

  build-frontend:
    # Frontend install + type-check + Vitest + production build.
    # Job ID is the required-status-check name in settings.yml.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-node
      # `type-check` is also covered by `lint`; running it again here keeps
      # this job self-contained when invoked in isolation.
      - name: Frontend install + tests + build
        working-directory: frontend
        run: |
          npm ci
          npm run type-check
          npm run test
          npm run build
      - name: Upload frontend dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: error

  docker-build:
    # Sanity-build both Dockerfiles end-to-end. No push — deploy workflows are the only push path.
    runs-on: ubuntu-latest
    needs: [build-bff, build-business-service, build-frontend, sca-scan]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # Both Dockerfiles take the repo root as build context (the bff
      # 4-stage build references frontend/ and contracts/, the
      # business-service 2-stage build references contracts/). Tag with
      # the commit SHA only — this job validates that the image builds;
      # the deploy workflows are the only path that pushes.
      - name: Build bff image
        run: docker build -f bff/Dockerfile -t boatapp/bff:ci-${{ github.sha }} .
      - name: Build business-service image
        run: docker build -f business-service/Dockerfile -t boatapp/business-service:ci-${{ github.sha }} .

  secret-scan:
    # gitleaks: scan full history on every push/PR for non-format-known secrets.
    # Job ID is the required-status-check name in settings.yml.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # gitleaks scans full history; default fetch-depth=1 would limit
          # detection to the current commit and miss secrets that landed
          # earlier on the branch.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required only for org-owned repos. Personal-
          # account runs ignore it; the env var being unset is harmless.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  container-scan:
    # Trivy SARIF on built images, fails HIGH+CRITICAL with fix available.
    # Job ID is the required-status-check name in settings.yml.
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [bff, business-service]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # Rebuild on this runner: jobs do not share the docker-build job's
      # daemon, and `docker save`/`load` artifact shuffling is more code
      # for no real benefit — BuildKit's local cache makes the rebuild
      # fast enough.
      - name: Build image for scanning
        run: docker build --file ${{ matrix.image }}/Dockerfile --tag local/${{ matrix.image }}:${{ github.sha }} .
      - name: Trivy vulnerability scan (HIGH+CRITICAL, fixable)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: 'local/${{ matrix.image }}:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          # `ignore-unfixed: true` keeps the gate honest: blocking on
          # upstream-unfixable findings would just create noise. They
          # still surface in the Security tab via SARIF — same bar as
          # OSV-Scanner's source-side `--fail-on-vuln=HIGH`.
          ignore-unfixed: true
      # Upload SARIF even when Trivy failed the job, otherwise the
      # findings would only live in the run log — `if: always()` makes
      # them queryable from the Security tab and Dependabot.
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          sarif_file: 'trivy-${{ matrix.image }}.sarif'
          category: 'trivy-${{ matrix.image }}'

  e2e-tests:
    # Boots the local-intg compose stack and runs Playwright against the BFF.
    # Job ID is the required-status-check name in settings.yml.
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup-node
      - name: Start local-intg stack
        # The BFF signing-key PEM is created by the `bff-keygen` init
        # service inside `docker compose up` itself (idempotent). We
        # deliberately do NOT pre-generate it here so CI exercises the
        # exact same single-command boot path documented to end users.
        run: docker compose up -d --build
      - name: Verify bff-keygen produced the signing key
        # Asserts that the init container actually wrote the PEM where
        # the BFF service reads it. Without this, a silent regression
        # in `bff-keygen` (e.g. exit 0 with an empty file) would surface
        # 120s later as a generic "stack failed to come healthy" timeout
        # from the wait step. The PEM lives in the `bff-signing-key`
        # named volume — never on the host — so we exec into the BFF
        # container to test the path it actually reads.
        run: docker compose exec -T bff test -s /var/lib/bff-keys/bff-signing-key.pem
      # Both health probes have docker-side healthchecks already, but the
      # SPA test framework polls these URLs from the runner host where
      # the container healthcheck status is invisible. Poll until 200.
      - name: Wait for stack to become healthy
        # `--max-time 2` caps EACH probe; without it a hung-but-listening
        # service would consume the entire 120s budget on a single probe
        # via curl's default 120s timeout.
        run: |
          set -euo pipefail
          BFF_HEALTH=http://localhost:8080/actuator/health
          KC_OIDC=http://localhost:8180/realms/boat-app/.well-known/openid-configuration
          for url in "${BFF_HEALTH}" "${KC_OIDC}"; do
            echo "polling ${url}"
            for i in $(seq 1 60); do
              if curl -sfo /dev/null --max-time 2 "${url}"; then
                echo "  ok after ${i} attempts"
                break
              fi
              if [ "${i}" -eq 60 ]; then
                echo "::error::timeout waiting for ${url}"
                docker compose ps
                docker compose logs --tail=200
                exit 1
              fi
              sleep 2
            done
          done
      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright E2E suite
        working-directory: frontend
        run: npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore
      - name: Tear down stack
        # Always run, even on cancellation — leaking containers across
        # runs would poison subsequent E2E jobs on self-hosted runners.
        if: always()
        run: docker compose down -v
