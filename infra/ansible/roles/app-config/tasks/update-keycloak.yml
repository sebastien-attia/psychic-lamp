---
# Update the Keycloak Container App: env vars only (image is pinned by
# Terraform via `quay.io/keycloak/keycloak:<version>` and rarely changes).
#
# We deliberately do NOT pass `--image` here — bumping the Keycloak version
# is a separate, audited change. This task only refreshes runtime config
# (admin credentials, DB connection) so secret rotation is a one-command op.

- name: Update keycloak Container App env (no image change)
  ansible.builtin.command:
    argv:
      - az
      - containerapp
      - update
      - --name
      - "{{ container_app_keycloak }}"
      - --resource-group
      - "{{ resource_group }}"
      - --set-env-vars
      - "KC_DB=postgres"
      - "KC_DB_URL={{ jdbc_urls['keycloak'] }}"
      - "KC_DB_USERNAME=keycloak"
      - "KC_DB_PASSWORD={{ kv_secrets['keycloak-db-password'] }}"
      - "KC_HOSTNAME={{ keycloak_fqdn }}"
      - "KC_PROXY_HEADERS={{ app_config_kc_proxy_headers }}"
      - "KC_HTTP_ENABLED=false"
      - "KC_HEALTH_ENABLED=true"
      - "KC_METRICS_ENABLED=true"
      - "KEYCLOAK_ADMIN={{ keycloak_admin_username }}"
      - "KEYCLOAK_ADMIN_PASSWORD={{ kv_secrets['keycloak-admin-password'] }}"
  register: keycloak_update
  changed_when: keycloak_update.rc == 0
  no_log: true
