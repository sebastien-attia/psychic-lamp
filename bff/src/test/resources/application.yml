# Test-only profile-less config: provides everything BffConfig + SecurityConfig
# need to wire under @Profile("!dev") without contacting Keycloak or the
# Business Service.
#
# Why this file exists: the Initializr-generated BffApplicationTests runs with
# NO active profile, so @Profile("!dev") matches and BffConfig fires. That
# triggers ${bff.signing-key.path} resolution and needs a Keycloak client
# registration plus an OAuth2AuthorizedClientRepository. We supply explicit
# token / authorization / jwk-set URIs so Spring skips OIDC discovery (no
# HTTP fired at startup).
#
# bff.signing-key.path is provided at runtime by
# BffApplicationTests#signingKey via @DynamicPropertySource — a fresh RSA
# key is generated per test run, so no committed PEM material lives under
# src/test/resources/.
spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: test-client
            client-authentication-method: private_key_jwt
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope: openid,profile,email
        provider:
          keycloak:
            authorization-uri: http://localhost/kc/auth
            token-uri: http://localhost/kc/token
            jwk-set-uri: http://localhost/kc/jwks
            user-info-uri: http://localhost/kc/userinfo
            user-name-attribute: preferred_username

bff:
  signing-key:
    id: test-kid
    # path injected at runtime by BffApplicationTests#signingKey

business-service:
  url: http://localhost:8081
