parent=keycloak

styles=css/styles.css
scripts=js/shuffle.js

# Parent rationale:
#   - `parent=keycloak` (the v1 base) inherits the full English/French
#     message bundle (loginTitle, password, doLogIn, rememberMe, …) so
#     the form renders human copy without us having to copy every key
#     into our own `messages/*.properties`. Keys we DO define
#     (e.g. `loginAccountTitle`, `doShuffle`) override the parent's.
#   - Our `template.ftl` controls the entire `<head>`, so only our
#     `styles` / `scripts` are loaded — the upstream Patternfly CSS
#     does NOT bleed in even though we extend `keycloak`.
#
# Scope: only `login.ftl` is themed by this folder. Reset-password,
# OTP, email-verification and other auth flows fall back to the
# upstream `keycloak` parent's `template.ftl` and look like stock
# Keycloak. Future iterations can override those `*.ftl` files to
# extend the random-split surface across every flow.
