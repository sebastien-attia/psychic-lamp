# .github/actions/terraform-plan-summary/action.yml
#
# What this action does:
#   Renders a Terraform plan (in -json form) as a markdown table to
#   $GITHUB_STEP_SUMMARY and, when the workflow is running on a pull_request
#   event, posts the same table as a PR comment. Action counts (create /
#   update / delete / replace) come from `.resource_changes[].change.actions`.
#
# Who calls it:
#   - .github/workflows/terraform-plan.yml (PR gate against the staging
#     environment).
#   - .github/workflows/deploy-staging.yml + deploy-production.yml — the
#     `plan` job uploads the same tfplan.json as a build artifact and then
#     pipes it through this composite, so the apply-job approver sees the
#     resource diff in the run summary before clicking "Approve".
#
# Anti-goals: this action does NOT call terraform itself (the caller already
# produced the JSON via `terraform show -json tfplan.binary`) and does NOT
# render a full plain-text plan. The full plan stays available as the
# uploaded `tfplan-<run_id>` artifact for reviewers who need raw output.

name: 'Terraform plan summary'
description: |
  Renders tfplan.json as a markdown summary (counts + per-resource table)
  to $GITHUB_STEP_SUMMARY and, on a pull_request event, posts the same
  summary as a PR comment.

inputs:
  plan-json:
    description: 'Path to the terraform-plan JSON (output of `terraform show -json tfplan.binary`).'
    required: true
  comment-on-pr:
    description: 'Whether to also post a PR comment when running on pull_request. Defaults to true.'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - id: render
      shell: bash
      env:
        PLAN_JSON: ${{ inputs.plan-json }}
      run: |
        set -euo pipefail
        if [ ! -s "${PLAN_JSON}" ]; then
          echo "::warning::terraform-plan-summary: ${PLAN_JSON} missing or empty"
          exit 0
        fi

        SUMMARY_FILE=$(mktemp)
        # Counts per action — `actions` is an array (e.g. ["create"],
        # ["update"], or ["delete","create"] for a replace). Replace
        # operations show up as both delete and create — we pick them out
        # explicitly so the create/delete totals don't double-count.
        CREATE=$(jq '[.resource_changes[]? | select(.change.actions == ["create"])] | length' "${PLAN_JSON}")
        UPDATE=$(jq '[.resource_changes[]? | select(.change.actions == ["update"])] | length' "${PLAN_JSON}")
        DELETE=$(jq '[.resource_changes[]? | select(.change.actions == ["delete"])] | length' "${PLAN_JSON}")
        REPLACE=$(jq '[.resource_changes[]? | select(.change.actions | (. == ["delete","create"]) or . == ["create","delete"])] | length' "${PLAN_JSON}")
        NOOP=$(jq '[.resource_changes[]? | select(.change.actions == ["no-op"])] | length' "${PLAN_JSON}")

        {
          echo "## Terraform plan summary"
          echo ""
          echo "| Action | Count |"
          echo "|--------|------:|"
          echo "| create  | ${CREATE} |"
          echo "| update  | ${UPDATE} |"
          echo "| delete  | ${DELETE} |"
          echo "| replace | ${REPLACE} |"
          echo "| no-op   | ${NOOP} |"
          echo ""
          # Per-resource table (skipping no-op rows). Cap at 100 entries
          # to keep the markdown body well below GitHub's 65 KB cap.
          # Surface the truncation explicitly — silently dropping rows
          # would let a reviewer trust the visible diff and miss what's
          # hidden on a 200+ resource change-set.
          CHANGED=$(jq '[.resource_changes[]? | select(.change.actions != ["no-op"])] | length' "${PLAN_JSON}")
          MAX_ROWS=100
          echo "<details><summary>Resource changes (${CHANGED} total)</summary>"
          echo ""
          echo "| Action | Address |"
          echo "|--------|---------|"
          jq -r '
            .resource_changes[]?
            | select(.change.actions != ["no-op"])
            | "| \((.change.actions | join("+")))  | `\(.address)` |"
          ' "${PLAN_JSON}" | head -n "${MAX_ROWS}"
          if [ "${CHANGED}" -gt "${MAX_ROWS}" ]; then
            HIDDEN=$(( CHANGED - MAX_ROWS ))
            echo ""
            echo "_…and ${HIDDEN} more change(s) truncated; see the \`tfplan-<run_id>\` artifact for the full plan._"
          fi
          echo ""
          echo "</details>"
        } > "${SUMMARY_FILE}"

        # Always emit to GITHUB_STEP_SUMMARY so reviewers see it in the run UI.
        cat "${SUMMARY_FILE}" >> "$GITHUB_STEP_SUMMARY"
        # Stash for the PR-comment step.
        echo "summary-file=${SUMMARY_FILE}" >> "$GITHUB_OUTPUT"

    - if: ${{ github.event_name == 'pull_request' && inputs.comment-on-pr == 'true' }}
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        SUMMARY_FILE: ${{ steps.render.outputs.summary-file }}
      with:
        script: |
          const fs = require('fs');
          const path = process.env.SUMMARY_FILE;
          if (!path || !fs.existsSync(path)) {
            core.warning(`terraform-plan-summary: summary file missing (${path})`);
            return;
          }
          const body = fs.readFileSync(path, 'utf8');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
