# BFF staging profile — Azure Web App for Containers + Azure PostgreSQL
# Flexible Server. The signing key PEM is delivered as an env var resolved
# from a Key Vault reference (App Service has no first-class file mount
# for KV references); the BffConfig bean parses the PEM string directly.
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_FQDN}:5432/${BFF_DB_NAME:bff_session}?sslmode=require
    username: ${BFF_DB_USER}
    password: ${BFF_DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-authentication-method: private_key_jwt
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope:
              - openid
              - profile
              - email
              - offline_access
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
            user-name-attribute: preferred_username

bff:
  signing-key:
    # Empty default — if the env var is unset, BffConfig surfaces a
    # "BFF signing key not configured" error rather than choking on the
    # literal placeholder when parsing the PEM.
    pem: ${BFF_SIGNING_KEY_PEM:}
    id: ${BFF_SIGNING_KEY_ID}

business-service:
  url: ${BUSINESS_SERVICE_URL}

server:
  # Honour X-Forwarded-* headers set by the Azure App Service front door.
  # Without this, Spring builds redirect URIs (and OAuth2 redirect_uri) from
  # the internal Host header (`localhost:8080`), so a browser hitting the
  # public URL gets redirected to localhost after Keycloak login.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: true

# Mirror Spring's stdout to a file under /home/LogFiles — App Service for
# Containers does not capture container stdout in the platform docker.log,
# so a startup crash (e.g. Liquibase BeanCreationException) is invisible to
# `az webapp log download` without this file sink. /home/LogFiles is the
# platform-recognised root (siblings of *_docker.log) and is included by
# both `az webapp log download` and Kudu vfs. An explicit `name:` pins the
# file so it cannot collide with the platform's docker.log naming.
logging:
  file:
    name: /home/LogFiles/bff-spring.log
