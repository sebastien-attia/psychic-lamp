# .github/workflows/terraform-plan.yml
#
# Pull-request gate for infrastructure changes. Runs `terraform plan`
# against the staging environment (lower-risk than production, and
# representative of the same module surface) and posts the diff as a
# PR comment so reviewers can see resource churn before approving.
#
# Trigger: PRs that touch any file under `infra/terraform/**`.
#
# Phase-4b changes (vs phase 4):
#   - All `uses:` SHA-pinned (Dependabot tag-comment retained).
#   - Plan is also persisted as `tfplan-<run_id>` (binary + JSON), parity
#     with deploy-*.yml so the same artifact convention applies everywhere.
#   - PR comment is now rendered by the shared `terraform-plan-summary`
#     composite (markdown-table form via tfplan.json) instead of inline
#     github-script. The full plain-text plan is still uploaded under the
#     name `terraform-plan` for reviewers who want raw output.

name: Terraform Plan

on:
  pull_request:
    paths: ['infra/terraform/**']

permissions:
  id-token: write       # OIDC for `azure/login@v2`
  contents: read
  pull-requests: write  # post the plan as a PR comment

jobs:
  plan:
    # PR-time terraform plan against staging; posts a markdown summary
    # comment and uploads tfplan-<run_id> for parity with deploy workflows.
    name: terraform plan (staging)
    runs-on: ubuntu-latest
    env:
      # `terraform plan` doesn't strictly need passwords (no apply), but
      # validate phase resolves them. Wire the same TF_VAR_* env vars as
      # the deploy workflows so the plan succeeds without --target juggling.
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_postgres_admin_password }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_bff_db_password }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_business_db_password }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_keycloak_db_password }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_keycloak_admin_password }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: '1.9.8'

      - name: Terraform init
        working-directory: infra/terraform/environments/staging
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"

      - name: Terraform plan
        id: plan
        working-directory: infra/terraform/environments/staging
        # `-detailed-exitcode` returns 2 when there are diffs; we want
        # the workflow to keep going (not fail) so we can post the plan.
        # We capture both forms:
        #   plan.txt          plain-text plan (uploaded as artifact + used as fallback PR comment)
        #   tfplan.binary     binary plan (uploaded for parity with deploy-*.yml)
        #   tfplan.json       structured plan (consumed by terraform-plan-summary)
        # Terraform redacts inputs declared `sensitive = true` as
        # `<<sensitive>>` in plan output — values that are NOT declared
        # sensitive but derived from sensitive inputs may still leak
        # into plan.txt. Reviewers must check that no such derivations
        # are introduced when they edit module surface.
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan.binary
          ec=$?
          set -e
          terraform show -no-color tfplan.binary > plan.txt
          terraform show -json    tfplan.binary > tfplan.json
          echo "exitcode=${ec}" >> "$GITHUB_OUTPUT"

      - name: Render plan summary + PR comment
        uses: ./.github/actions/terraform-plan-summary
        with:
          plan-json: infra/terraform/environments/staging/tfplan.json
          comment-on-pr: 'true'

      - name: Upload full plan output as artifact
        # Plan-summary renders a structured table; this artifact preserves
        # the full plain-text plan for reviewers who want raw output.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-plan
          path: infra/terraform/environments/staging/plan.txt
          if-no-files-found: error

      - name: Upload binary tfplan artifact (parity with deploy-*.yml)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            infra/terraform/environments/staging/tfplan.binary
            infra/terraform/environments/staging/tfplan.json
          retention-days: 30
          if-no-files-found: error
