---
# Reconcile the Keycloak realm.
#
# Delegates to adorsys/keycloak-config-cli, which consumes the same
# infra/keycloak/realm.yaml that local-intg's docker-compose sidecar uses.
# Single source of truth for the realm definition across all envs (no drift
# between local-intg JSON imports and Ansible community.general.keycloak_*
# tasks).
#
# Variables referenced by realm.yaml ($BFF_BASE_URL, $BFF_JWKS_URL) are
# resolved by config-cli at import time when IMPORT_VAR_SUBSTITUTION_ENABLED
# is true. The demo seed user (realm.users.local-intg.yaml) is NEVER imported
# in staging/production — that overlay is local-intg-only by design.

- name: Apply Keycloak realm config (same realm.yaml for all envs)
  hosts: localhost
  connection: local
  gather_facts: true        # need ansible_date_time for the unique container name
  vars_files:
    - "../vault/secrets.yml"
  vars:
    bff_base_url: "https://{{ bff_public_fqdn }}"
    # The BFF publishes its public JWKS at /.well-known/jwks.json (per realm.yaml
    # comment: client_authenticator_type: client-jwt + use.jwks.url=true).
    bff_jwks_url: "https://{{ bff_public_fqdn }}/.well-known/jwks.json"
  tasks:
    - name: Wait for Keycloak /health/ready
      ansible.builtin.uri:
        url: "https://{{ keycloak_fqdn }}/health/ready"
        status_code: 200
        validate_certs: true
      register: kc_ready
      until: kc_ready.status == 200
      retries: 30
      delay: 5

    - name: Read keycloak-admin-password from Key Vault
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "https://{{ keyvault_name }}.vault.azure.net"
        name: keycloak-admin-password
        auth_source: cli
      register: kc_admin_lookup
      no_log: true

    - name: Materialize Keycloak admin password
      ansible.builtin.set_fact:
        kc_admin_password: "{{ kc_admin_lookup.secrets[0].secret }}"
      no_log: true

    - name: Apply realm.yaml via keycloak-config-cli (idempotent create-or-update)
      community.docker.docker_container:
        name: "keycloak-config-cli-{{ ansible_date_time.epoch }}"
        image: "{{ keycloak_config_cli_image }}"
        cleanup: true
        detach: false
        recreate: true
        volumes:
          - "{{ playbook_dir }}/../../keycloak:/config:ro"
        env:
          KEYCLOAK_URL: "https://{{ keycloak_fqdn }}"
          KEYCLOAK_USER: "{{ keycloak_admin_username }}"
          KEYCLOAK_PASSWORD: "{{ kc_admin_password }}"
          KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
          KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: "120s"
          # NEVER include realm.users.local-intg.yaml here — local-intg only.
          IMPORT_FILES_LOCATIONS: "/config/realm.yaml"
          IMPORT_VAR_SUBSTITUTION_ENABLED: "true"
          # Variables referenced by realm.yaml at import time:
          BFF_BASE_URL: "{{ bff_base_url }}"
          BFF_JWKS_URL: "{{ bff_jwks_url }}"
          # DEMO_PASSWORD is only set when the env opts into the demo user
          # (staging) — production omits it so realm.yaml's optional demo
          # block (if added later) cannot accidentally seed a known account.
          DEMO_PASSWORD: "{{ vault_demo_password if (deploy_demo_user | bool) else '' }}"
      register: kc_config_result
      no_log: true

    # Materialize the exit code on a non-no_log task so failures surface in
    # operator logs without the secret-bearing register being printed.
    - name: Capture keycloak-config-cli exit code
      ansible.builtin.set_fact:
        kc_exit_code: "{{ kc_config_result.container.State.ExitCode | default(-1) }}"

    - name: Fail if keycloak-config-cli exited non-zero
      ansible.builtin.fail:
        msg: "keycloak-config-cli failed with exit code {{ kc_exit_code }}"
      when: kc_exit_code | int != 0
