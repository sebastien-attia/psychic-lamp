# infra/keycloak/realm.yaml
#
# BASE realm configuration (realm + client + role) for the boat-app realm.
# Imported in every environment:
#   - local-intg : the `keycloak-config` sidecar in docker-compose.yml
#   - staging    : Ansible docker task (see ai-scripts/02c3-ansible.md)
#   - prod       : Ansible docker task (same task, different inventory)
#
# A demo seed user lives in a SEPARATE overlay (realm.users.demo.yaml)
# that is imported alongside this file in EVERY environment — including
# staging and production — at the project owner's explicit request. See
# the SECURITY NOTE at the top of that overlay before relying on its
# absence.
#
# Env-specific values (BFF base URL, JWKS URL) are resolved at import time
# from environment variables — see infra/keycloak/env/*.env.
#
# IMPORTANT — export hygiene:
#   This file is HAND-AUTHORED. If you ever export a realm via the admin UI
#   for debugging, strip credentials/hashes/salts BEFORE committing.
#   Reference: ai-scripts/02a4-backend-auth.md step 4.
realm: boat-app
enabled: true
sslRequired: external
# Custom login theme shipped at keycloak/themes/boatapp-fun.
# In local-intg the theme is volume-mounted into the stock Keycloak
# image (see docker-compose.yml); in staging/prod it is COPY-ed into
# the optimized image via keycloak/Dockerfile.
loginTheme: boatapp-fun
clients:
  - clientId: boat-app-confidential
    enabled: true
    publicClient: false
    standardFlowEnabled: true
    directAccessGrantsEnabled: false
    # Authenticate to the token endpoint with a signed JWT (RFC 7523).
    # NO shared client_secret — use.jwks.url=true tells Keycloak to fetch the
    # BFF's public JWKS at the URL below (the BFF publishes its public key at
    # /.well-known/jwks.json via JwksController).
    clientAuthenticatorType: client-jwt
    attributes:
      use.jwks.url: "true"
      jwks.url: "${BFF_JWKS_URL}"
      token.endpoint.auth.signing.alg: RS256
      # OIDC RP-initiated logout: the BFF's
      # OidcClientInitiatedLogoutSuccessHandler sends Keycloak a
      # post_logout_redirect_uri pointing at "{baseUrl}" of the BFF.
      # Without this attribute Keycloak rejects the redirect and the
      # browser is left on the previous page, so the SPA never sees the
      # sign-out land — see SecurityConfig.oidcLogoutSuccessHandler().
      post.logout.redirect.uris: "${BFF_BASE_URL}/*"
    redirectUris:
      - "${BFF_BASE_URL}/*"
    webOrigins:
      - "${BFF_BASE_URL}"
roles:
  realm:
    - name: user
      description: Standard boat-app user
# NOTE: no `users:` block in the base file. The `demo` seed user is in
# infra/keycloak/realm.users.demo.yaml, imported alongside this file in
# every environment.
