---
# monitoring role.
#
# Configures diagnostic settings on each Container App so console + system
# logs ship to the Log Analytics workspace declared by Terraform's
# observability module. Idempotent — `az monitor diagnostic-settings create`
# is a PUT on the diagnostic-settings collection.
#
# The Log Analytics workspace ID is resolved at runtime via az CLI rather
# than passed through a Terraform output, so adding observability later
# doesn't require re-plumbing this role.

- name: Skip monitoring when disabled
  ansible.builtin.meta: end_play
  when: not (monitoring_enabled | bool)

- name: Resolve Log Analytics workspace resource ID
  ansible.builtin.command:
    argv:
      - az
      - monitor
      - log-analytics
      - workspace
      - list
      - --resource-group
      - "{{ resource_group }}"
      - --query
      - "[0].id"
      - --output
      - tsv
  register: law_id
  changed_when: false

- name: Fail if no workspace exists in this resource group
  ansible.builtin.fail:
    msg: "No Log Analytics workspace found in {{ resource_group }} — provision one in Terraform first."
  when: law_id.stdout | trim | length == 0

- name: Resolve Container App resource IDs
  ansible.builtin.command:
    argv:
      - az
      - containerapp
      - show
      - --name
      - "{{ item }}"
      - --resource-group
      - "{{ resource_group }}"
      - --query
      - "id"
      - --output
      - tsv
  loop:
    - "{{ container_app_bff }}"
    - "{{ container_app_business_service }}"
    - "{{ container_app_keycloak }}"
  register: app_ids
  changed_when: false

- name: Apply diagnostic settings to each Container App
  ansible.builtin.command:
    argv:
      - az
      - monitor
      - diagnostic-settings
      - create
      - --name
      - "{{ monitoring_diagnostic_settings_name }}"
      - --resource
      - "{{ item.stdout | trim }}"
      - --workspace
      - "{{ law_id.stdout | trim }}"
      - --logs
      - "{{ monitoring_log_categories | map('regex_replace', '^(.*)$', '{\"category\":\"\\1\",\"enabled\":true}') | list | to_json }}"
  loop: "{{ app_ids.results }}"
  loop_control:
    label: "{{ item.item }}"
  register: diag_create
  changed_when: diag_create.rc == 0
  failed_when:
    - diag_create.rc != 0
    - "'already exists' not in (diag_create.stderr | default(''))"
