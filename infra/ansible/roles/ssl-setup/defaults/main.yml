---
# Defaults for the ssl-setup role.
#
# Disabled by default — flip per-env via group_vars/{env}.yml when a real
# custom domain is wired up. The default Container Apps FQDN
# (*.azurecontainerapps.io) carries a Microsoft-managed cert that Ansible
# does NOT need to provision.

# Whether to bind a custom domain + Container Apps Managed Certificate
# to the bff Container App.
ssl_setup_enabled: false

# Custom domain to bind (only consulted when ssl_setup_enabled is true).
ssl_setup_bff_custom_domain: ""

# CNAME validation token written to the public DNS provider (Cloudflare,
# Azure DNS, etc.) — must point at {{ bff_public_fqdn }}.
ssl_setup_validation_method: CNAME
