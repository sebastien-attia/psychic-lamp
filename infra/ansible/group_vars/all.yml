---
# Defaults shared by every environment.
#
# Per-env overrides live in group_vars/{staging,production}.yml. Values that
# depend on Terraform outputs are NOT set here — they're loaded as a fact in
# playbooks/deploy.yml pre_tasks (`tf_out` → `terraform_outputs`) and consumed
# by the per-env files.
#
# Secrets are NOT stored here — see vault/secrets.yml.example.

project_name: boatapp

# ── Image tags / repos ──────────────────────────────────────────────────────
# A single IMAGE_TAG env var drives both images so a deploy is one immutable
# pair of artifacts. Override per-deploy with `IMAGE_TAG=<sha> ansible-playbook`.
acr_repository_bff: bff
acr_repository_business: business-service
bff_image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
business_service_image_tag: "{{ bff_image_tag }}"

# ── Container App names (Terraform-fixed, stable across envs) ───────────────
container_app_bff: bff
container_app_business_service: business-service
container_app_keycloak: keycloak

# ── Liquibase ACA Job polling ───────────────────────────────────────────────
liquibase_job_poll_interval_seconds: 10
liquibase_job_poll_retries: 60          # 10s × 60 = 10min cap per job

# ── Health-check tuning ─────────────────────────────────────────────────────
healthcheck_max_retries: 5
healthcheck_initial_delay_seconds: 10
healthcheck_retry_delay_seconds: 10

# ── BFF runtime config (mount path matches Terraform secret-volume) ─────────
bff_signing_key_path: /mnt/secrets/bff-signing-key
bff_signing_key_id: bff-key-1

# ── Keycloak ────────────────────────────────────────────────────────────────
keycloak_admin_username: admin
keycloak_realm: boat-app
keycloak_client_id: boat-app-confidential
keycloak_config_cli_image: docker.io/adorsys/keycloak-config-cli:latest-26.6.1

# ── Defaults that staging overrides ─────────────────────────────────────────
deploy_demo_user: false
ssl_setup_enabled: false
monitoring_enabled: true
