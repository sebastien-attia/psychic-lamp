# Creates BOATS — the core domain aggregate. `id` is assigned by the domain
# (no DB sequence). `version` drives Hibernate optimistic locking and feeds
# the ETag/If-Match header on the wire.
databaseChangeLog:
  - changeSet:
      id: 002-create-boats-table
      author: boatapp
      changes:
        - createTable:
            tableName: boats
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(256)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
        - createIndex:
            indexName: ix_boats_name
            tableName: boats
            columns:
              - column:
                  name: name
