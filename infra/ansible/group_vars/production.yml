---
# Production-specific values. Same shape as staging.yml; differences:
#   - deploy_demo_user is OFF (no seed user with a known password in prod).
#   - ssl_setup_enabled may flip ON when a custom domain is wired (default OFF
#     so a fresh apply doesn't try to bind an absent CNAME).

resource_group: "{{ terraform_outputs.resource_group_name.value }}"
acr_login_server: "{{ terraform_outputs.acr_login_server.value }}"
keyvault_name: "{{ terraform_outputs.keyvault_uri.value | regex_replace('https://([^.]+)\\..*', '\\1') }}"
postgres_fqdn: "{{ terraform_outputs.postgres_fqdn.value }}"
postgres_admin_username: "{{ terraform_outputs.postgres_admin_username.value }}"
bff_public_fqdn: "{{ terraform_outputs.bff_fqdn.value }}"
business_service_internal_fqdn: "{{ terraform_outputs.business_service_internal_fqdn.value }}"
keycloak_fqdn: "{{ terraform_outputs.keycloak_fqdn.value }}"
liquibase_job_names: "{{ terraform_outputs.liquibase_job_names.value }}"
# jdbc_urls derivation — see staging.yml for the rationale.
jdbc_urls:
  bff_session: "jdbc:postgresql://{{ postgres_fqdn }}:5432/bff_session?sslmode=require"
  boatapp: "jdbc:postgresql://{{ postgres_fqdn }}:5432/boatapp?sslmode=require"
  keycloak: "jdbc:postgresql://{{ postgres_fqdn }}:5432/keycloak?sslmode=require"

spring_profiles_active: production

deploy_demo_user: false
ssl_setup_enabled: false
monitoring_enabled: true
