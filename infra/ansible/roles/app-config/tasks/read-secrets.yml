---
# Reads application-runtime secrets from Azure Key Vault.
#
# The vault has `public_network_access_enabled = false` and a deny-by-default
# network ACL with `bypass = "AzureServices"` (infra/terraform/modules/keyvault).
# When the runner is inside the VNet (preferred), reads go over the private
# endpoint; when running from a GitHub-hosted runner, the AzureServices bypass
# combined with OIDC-federated `az login` allows control-plane reads.
#
# The runner's managed identity must be granted `Key Vault Secrets User` —
# wired via Terraform's `additional_kv_consumer_principal_ids = { ansible_runner = ... }`.
#
# All tasks set `no_log: true` so secret values never reach Ansible's stdout
# or the cached job result on disk.

- name: Read Key Vault secrets (private endpoint when runner is in-VNet)
  azure.azcollection.azure_rm_keyvaultsecret_info:
    vault_uri: "https://{{ keyvault_name }}.vault.azure.net"
    name: "{{ item }}"
    auth_source: cli        # use the OIDC-federated `az login` context (see README)
  loop:
    - bff-db-password
    - business-db-password
    - keycloak-db-password
    - keycloak-admin-password
  register: kv_lookups
  no_log: true

- name: Build kv_secrets dict (name → value)
  ansible.builtin.set_fact:
    kv_secrets: "{{ kv_secrets | default({}) | combine({ item.item: item.secrets[0].secret }) }}"
  loop: "{{ kv_lookups.results }}"
  loop_control:
    label: "{{ item.item }}"
  no_log: true
