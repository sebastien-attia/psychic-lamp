name: Deploy — staging

# Trigger: any push to the `staging` branch.
#
# End-to-end shape (single deploy path, no infra/image fast lane):
#   ci          — reuse .github/workflows/ci.yml (build, scan, test).
#   build-push  — build 3 images, push to ACR with tag = staging-<sha8>.
#   terraform   — init + apply against environments/staging.
#                 The runner's egress IP is added to the database firewall
#                 for the duration of the job so the in-TF db-bootstrap
#                 module's local-exec psql call can reach the server.
#   deploy-app  — point each Web App at the new image tag and restart it.
#   smoke       — curl the BFF /actuator/health.
#
# No Ansible, no SLSA attestation, no cosign — those layers were removed
# along with the ACA topology in the topology-simplification PR.

on:
  push:
    branches: [staging]
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC federation to Entra ID
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AZURE_LOCATION: switzerlandnorth
  PROJECT_NAME: boatapp
  ENVIRONMENT: staging
  TF_DIR: infra/terraform/environments/staging

  # azurerm provider authentication. The provider runs in its own process,
  # NOT through `az` — so `azure/login@v2` doesn't reach it. ARM_USE_OIDC
  # tells the provider to fetch a GitHub-issued OIDC token at apply time;
  # ARM_CLIENT_ID + ARM_TENANT_ID + ARM_SUBSCRIPTION_ID identify the
  # federated identity to exchange that token for. Setting them at
  # workflow scope means every TF-running step (`terraform init`,
  # `output`, `apply`) picks them up without per-step duplication.
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # TF root variables — needed by every `terraform` invocation (even
  # `-target` applies validate the full variable surface). Promoting to
  # workflow scope avoids duplicating these between build-push and the
  # full-apply job.
  TF_VAR_postgres_admin_password:    ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
  TF_VAR_bff_db_password:            ${{ secrets.TF_VAR_BFF_DB_PASSWORD }}
  TF_VAR_business_db_password:       ${{ secrets.TF_VAR_BUSINESS_DB_PASSWORD }}
  TF_VAR_keycloak_db_password:       ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
  TF_VAR_keycloak_admin_password:    ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
  TF_VAR_ci_push_principal_id:       ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
  TF_VAR_tf_apply_principal_id:      ${{ secrets.AZURE_CLIENT_OBJECT_ID }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    # Reusable ci.yml's nested jobs (sca-scan, container-scan) upload SARIF
    # to code-scanning, which needs security-events: write + actions: read.
    # Without these, GitHub rejects the calling workflow at load time with
    # startup_failure. See commit f1d4d33 for the original incident.
    permissions:
      contents: read
      security-events: write
      actions: read

  build-push:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_tag:        ${{ steps.tag.outputs.tag }}
      acr_login_server: ${{ steps.tf-output.outputs.acr_login_server }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=staging-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure TF-state blob container exists
        # `az storage container create` is idempotent — succeeds if the
        # container already exists, creates it on a fresh storage account.
        # backend.tf hardcodes `container_name = "tfstate"`, so the name
        # here must match.
        run: |
          az storage container create \
            --name          tfstate \
            --account-name  "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --auth-mode     login \
            --public-access off \
            --output        none

      - name: Bootstrap RG + ACR (targeted terraform apply)
        id: tf-output
        # The `build-push` job needs an ACR to push images to. On the very
        # first deploy of a fresh environment, nothing exists yet — the
        # full `terraform apply` runs LATER in the workflow, so we'd be
        # pushing to a registry that doesn't exist.
        #
        # Solution: a tiny targeted apply here that creates ONLY the
        # resource group and the container registry. Idempotent — on every
        # subsequent run, both already exist and Terraform reports "no
        # changes". The full apply later still creates everything else.
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve \
            -target='module.boatapp.azurerm_resource_group.this' \
            -target='module.boatapp.module.container_registry'
          ACR=$(terraform output -json 2>/dev/null | jq -r '.acr_login_server.value // empty')
          if [ -z "$ACR" ]; then
            echo "::error::Targeted apply succeeded but acr_login_server output is still empty — investigate."
            exit 1
          fi
          echo "acr_login_server=${ACR}" >> "$GITHUB_OUTPUT"

      - name: az acr login
        run: az acr login --name "$(echo '${{ steps.tf-output.outputs.acr_login_server }}' | cut -d. -f1)"

      - name: Build & push BFF
        uses: ./.github/actions/docker-build-push
        with:
          context:    .
          dockerfile: bff/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/bff
          tags:       ${{ steps.tag.outputs.tag }}

      - name: Build & push business-service
        uses: ./.github/actions/docker-build-push
        with:
          context:    .
          dockerfile: business-service/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/business-service
          tags:       ${{ steps.tag.outputs.tag }}

      # Keycloak is NOT built here — App Service pulls the upstream image
      # straight from quay.io. The keycloak_image_tag TF variable is the
      # only knob; bump it via a TF apply when a new Keycloak release is
      # cut.

  terraform:
    needs: build-push
    runs-on: ubuntu-latest
    outputs:
      bff_fqdn:                  ${{ steps.outputs.outputs.bff_fqdn }}
      business_service_fqdn:     ${{ steps.outputs.outputs.business_service_fqdn }}
      keycloak_fqdn:             ${{ steps.outputs.outputs.keycloak_fqdn }}
      bff_app_name:              ${{ steps.outputs.outputs.bff_app_name }}
      business_service_app_name: ${{ steps.outputs.outputs.business_service_app_name }}
      keycloak_app_name:         ${{ steps.outputs.outputs.keycloak_app_name }}
      resource_group_name:       ${{ steps.outputs.outputs.resource_group_name }}
    env:
      # ARM_* and TF_VAR_* secrets come from workflow-scope env: block.
      # Image tags can't be at workflow scope (they reference job outputs).
      TF_VAR_bff_image_tag:              ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_business_service_image_tag: ${{ needs.build-push.outputs.image_tag }}
      # Keycloak image tag is set by the TF default; no per-deploy override.
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure TF-state blob container exists
        run: |
          az storage container create \
            --name          tfstate \
            --account-name  "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --auth-mode     login \
            --public-access off \
            --output        none

      # No per-run firewall poke needed: the AllowAllAzureServicesAndResourcesWithinAzureIps
      # rule (created by the database module) covers Microsoft-hosted GitHub
      # runners as well as the App Service Web Apps.

      - name: terraform init + apply
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve

      - name: Capture outputs
        id: outputs
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          {
            echo "bff_fqdn=$(terraform output -raw bff_fqdn)"
            echo "business_service_fqdn=$(terraform output -raw business_service_fqdn)"
            echo "keycloak_fqdn=$(terraform output -raw keycloak_fqdn)"
            echo "bff_app_name=$(terraform output -raw bff_app_name)"
            echo "business_service_app_name=$(terraform output -raw business_service_app_name)"
            echo "keycloak_app_name=$(terraform output -raw keycloak_app_name)"
            echo "resource_group_name=$(terraform output -raw resource_group_name)"
          } >> "$GITHUB_OUTPUT"

  # Reconcile the Keycloak `boat-app` realm before deploy-app restarts the
  # BFF. The BFF's Spring Security OAuth2 client fetches
  # ${KEYCLOAK_ISSUER_URI}/.well-known/openid-configuration during context
  # init; if the realm is missing, BFF startup fails with
  # "Realm does not exist" and the container exits with code 1. This step
  # closes the gap left when Ansible was removed from the deploy
  # (deploy-staging.yml:17 — "No Ansible…"); the desired-state YAML at
  # infra/keycloak/realm.yaml has been orphaned since then.
  #
  # Idempotent: keycloak-config-cli does create-or-update against the admin
  # API. Safe to re-run on every deploy.
  keycloak-config:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply infra/keycloak/realm.yaml
        env:
          KEYCLOAK_FQDN: ${{ needs.terraform.outputs.keycloak_fqdn }}
          BFF_FQDN:      ${{ needs.terraform.outputs.bff_fqdn }}
          # Default keycloak_admin_username in infra/terraform/variables.tf
          # (line 78) is "kcadmin"; if it's ever overridden via TF_VAR, this
          # constant must be updated in lockstep.
          KEYCLOAK_USER: kcadmin
          KEYCLOAK_PASSWORD: ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          # Pin to the same minor as the Keycloak server (KC 26.x); the CLI
          # tracks the server version per adorsys's tag scheme.
          docker run --rm \
            -v "$PWD/infra/keycloak:/config:ro" \
            -e KEYCLOAK_URL="https://${KEYCLOAK_FQDN}" \
            -e KEYCLOAK_USER="${KEYCLOAK_USER}" \
            -e KEYCLOAK_PASSWORD="${KEYCLOAK_PASSWORD}" \
            -e KEYCLOAK_AVAILABILITYCHECK_ENABLED=true \
            -e KEYCLOAK_AVAILABILITYCHECK_TIMEOUT=180s \
            -e IMPORT_FILES_LOCATIONS=/config/realm.yaml \
            -e IMPORT_VARSUBSTITUTION_ENABLED=true \
            -e 'IMPORT_VARSUBSTITUTION_PREFIX=${' \
            -e 'IMPORT_VARSUBSTITUTION_SUFFIX=}' \
            -e BFF_BASE_URL="https://${BFF_FQDN}" \
            -e BFF_JWKS_URL="https://${BFF_FQDN}/.well-known/jwks.json" \
            docker.io/adorsys/keycloak-config-cli:latest-26.5.4

  deploy-app:
    needs: [build-push, terraform, keycloak-config]
    runs-on: ubuntu-latest
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set new image tag on bff + business-service and restart
        env:
          ACR_LOGIN_SERVER: ${{ needs.build-push.outputs.acr_login_server }}
          IMAGE_TAG:        ${{ needs.build-push.outputs.image_tag }}
          RG:               ${{ needs.terraform.outputs.resource_group_name }}
          BFF_APP:          ${{ needs.terraform.outputs.bff_app_name }}
          BUSINESS_APP:     ${{ needs.terraform.outputs.business_service_app_name }}
        run: |
          set -euo pipefail
          # Keycloak is intentionally absent — its image is pinned in TF and
          # changes only via TF apply. The new BFF / business-service tags
          # need an out-of-TF nudge so the apps actually load them now.
          for app_repo in \
              "${BFF_APP}:bff" \
              "${BUSINESS_APP}:business-service"; do
            APP="${app_repo%%:*}"
            REPO="${app_repo##*:}"
            az webapp config container set \
              --resource-group       "${RG}" \
              --name                 "${APP}" \
              --container-image-name "${ACR_LOGIN_SERVER}/${REPO}:${IMAGE_TAG}" \
              --output none
            az webapp restart \
              --resource-group "${RG}" \
              --name           "${APP}" \
              --output none
          done

  smoke:
    needs: [terraform, deploy-app]
    runs-on: ubuntu-latest
    steps:
      - name: Probe BFF /actuator/health
        env:
          BFF_FQDN: ${{ needs.terraform.outputs.bff_fqdn }}
        run: |
          set -euo pipefail
          # Web Apps cold-start can take 60-90s after a container swap.
          for i in $(seq 1 30); do
            if curl -fsSL "https://${BFF_FQDN}/actuator/health" | grep -q '"status":"UP"'; then
              echo "BFF healthy after ${i} attempts."
              exit 0
            fi
            echo "Attempt ${i}: not healthy yet, waiting 10s..."
            sleep 10
          done
          echo "::error::BFF /actuator/health did not return UP within 5 min."
          curl -i "https://${BFF_FQDN}/actuator/health" || true
          exit 1
