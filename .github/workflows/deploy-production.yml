name: Deploy — production

# Trigger: a GitHub Release is published (the release tag — e.g. v1.0.0 —
# becomes the immutable image tag). Pushes to `main` do NOT auto-deploy:
# operators cut a Release after staging soak, and that is what fires this
# workflow. workflow_dispatch is kept for ad-hoc reruns; when invoked that
# way, the caller MUST supply a `tag` input (a git ref that will be
# checked out and used as the image tag).
#
# Manual gate: the `apply` job runs in the GitHub Environment "production",
# which has Required Reviewers configured. The `plan` job runs without a
# gate so reviewers see the diff they're approving inside the run summary.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to deploy (e.g. v1.0.0). Must already exist on the remote.'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  # One in-flight production deploy per release tag. Same-tag re-runs queue;
  # different tags can run in parallel (rare but legal during a hotfix).
  group: deploy-production-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  AZURE_LOCATION: switzerlandnorth
  PROJECT_NAME: boatapp
  ENVIRONMENT: production
  TF_DIR: infra/terraform/environments/production

  # azurerm provider OIDC auth — see deploy-staging.yml for the rationale.
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # TF root variables — see deploy-staging.yml for the rationale.
  TF_VAR_postgres_admin_password:    ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
  TF_VAR_bff_db_password:            ${{ secrets.TF_VAR_BFF_DB_PASSWORD }}
  TF_VAR_business_db_password:       ${{ secrets.TF_VAR_BUSINESS_DB_PASSWORD }}
  TF_VAR_keycloak_db_password:       ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
  TF_VAR_keycloak_admin_password:    ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
  TF_VAR_ci_push_principal_id:       ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
  TF_VAR_tf_apply_principal_id:      ${{ secrets.AZURE_CLIENT_OBJECT_ID }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    # See deploy-staging.yml for the rationale.
    permissions:
      contents: read
      security-events: write
      actions: read

  build-push:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_tag:        ${{ steps.tag.outputs.tag }}
      release_ref:      ${{ steps.tag.outputs.ref }}
      acr_login_server: ${{ steps.tf-output.outputs.acr_login_server }}
    steps:
      - name: Resolve release ref + image tag
        id: tag
        env:
          RELEASE_TAG_FROM_EVENT: ${{ github.event.release.tag_name }}
          DISPATCH_TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          REF="${RELEASE_TAG_FROM_EVENT:-${DISPATCH_TAG_INPUT}}"
          if [ -z "$REF" ]; then
            echo "::error::No release tag available — neither release.tag_name nor inputs.tag was set." >&2
            exit 1
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          # Production tag = the release tag verbatim (e.g. v1.0.0).
          # Immutable per release.
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"
          # Maven ${revision} = release tag with the `v` prefix stripped
          # (v1.0.0 → 1.0.0). Drives the JAR filename and /actuator/info.
          echo "revision=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.ref }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure TF-state blob container exists
        # Idempotent — succeeds whether or not the container already exists.
        # backend.tf hardcodes `container_name = "tfstate"`.
        run: |
          az storage container create \
            --name          tfstate \
            --account-name  "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --auth-mode     login \
            --public-access off \
            --output        none

      - name: Bootstrap RG + ACR (targeted terraform apply)
        id: tf-output
        # See deploy-staging.yml for the rationale.
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve \
            -target='module.boatapp.azurerm_resource_group.this' \
            -target='module.boatapp.module.container_registry'
          ACR=$(terraform output -json 2>/dev/null | jq -r '.acr_login_server.value // empty')
          if [ -z "$ACR" ]; then
            echo "::error::Targeted apply succeeded but acr_login_server output is still empty — investigate."
            exit 1
          fi
          echo "acr_login_server=${ACR}" >> "$GITHUB_OUTPUT"

      - name: az acr login
        run: az acr login --name "$(echo '${{ steps.tf-output.outputs.acr_login_server }}' | cut -d. -f1)"

      # ${revision} is the release tag minus the `v` prefix (1.0.0 not v1.0.0)
      # so the JAR baked into the image is named bff-1.0.0.jar /
      # business-service-bootstrap-1.0.0.jar and /actuator/info reports 1.0.0.
      - name: Build & push BFF
        uses: ./.github/actions/docker-build-push
        with:
          context:    .
          dockerfile: bff/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/bff
          tags:       ${{ steps.tag.outputs.tag }}
          build-args: REVISION=${{ steps.tag.outputs.revision }}

      - name: Build & push business-service
        uses: ./.github/actions/docker-build-push
        with:
          context:    .
          dockerfile: business-service/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/business-service
          tags:       ${{ steps.tag.outputs.tag }}
          build-args: REVISION=${{ steps.tag.outputs.revision }}

      # Keycloak is built from keycloak/Dockerfile so the custom
      # `boatapp-fun` login theme (referenced by infra/keycloak/realm.yaml)
      # is baked into the image. See deploy-staging.yml for the full
      # rationale; production differs only in that the image tag is the
      # release ref (e.g. v1.0.0) instead of staging-<sha8>.
      - name: Build & push keycloak
        uses: ./.github/actions/docker-build-push
        with:
          context:    ./keycloak
          dockerfile: keycloak/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/keycloak
          tags:       ${{ steps.tag.outputs.tag }}

  plan:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      # ARM_* and TF_VAR_* secrets come from workflow-scope env: block.
      TF_VAR_bff_image_tag:              ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_business_service_image_tag: ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_keycloak_image_tag:         ${{ needs.build-push.outputs.image_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-push.outputs.release_ref }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure TF-state blob container exists
        run: |
          az storage container create \
            --name          tfstate \
            --account-name  "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --auth-mode     login \
            --public-access off \
            --output        none

      - name: terraform plan
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform plan -input=false -out=tfplan
          # Compact diff into the run summary so reviewers can see what
          # they're approving without downloading the binary plan.
          {
            echo "## Terraform plan — production"
            echo
            echo '```'
            terraform show -no-color tfplan | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tfplan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

  apply:
    needs: [build-push, plan]
    runs-on: ubuntu-latest
    environment: production   # Required Reviewers gate sits on this environment.
    outputs:
      bff_fqdn:                  ${{ steps.outputs.outputs.bff_fqdn }}
      business_service_fqdn:     ${{ steps.outputs.outputs.business_service_fqdn }}
      keycloak_fqdn:             ${{ steps.outputs.outputs.keycloak_fqdn }}
      bff_app_name:              ${{ steps.outputs.outputs.bff_app_name }}
      business_service_app_name: ${{ steps.outputs.outputs.business_service_app_name }}
      keycloak_app_name:         ${{ steps.outputs.outputs.keycloak_app_name }}
      resource_group_name:       ${{ steps.outputs.outputs.resource_group_name }}
    # ARM_* and TF_VAR_* secrets come from the workflow-scope env: block,
    # so an operator can re-run this job manually with
    # `terraform apply -auto-approve` if the saved tfplan artifact is lost.
    env:
      TF_VAR_bff_image_tag:              ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_business_service_image_tag: ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_keycloak_image_tag:         ${{ needs.build-push.outputs.image_tag }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-push.outputs.release_ref }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure TF-state blob container exists
        run: |
          az storage container create \
            --name          tfstate \
            --account-name  "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            --auth-mode     login \
            --public-access off \
            --output        none

      # No per-run firewall poke needed — see deploy-staging.yml for why.

      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          # download-artifact lays a single-file artifact at this exact
          # path, leaving us with `${TF_DIR}/tfplan` ready for `apply`.
          name: tfplan-production
          path: ${{ env.TF_DIR }}

      - name: terraform apply tfplan
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve tfplan

      - name: Capture outputs
        id: outputs
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          {
            echo "bff_fqdn=$(terraform output -raw bff_fqdn)"
            echo "business_service_fqdn=$(terraform output -raw business_service_fqdn)"
            echo "keycloak_fqdn=$(terraform output -raw keycloak_fqdn)"
            echo "bff_app_name=$(terraform output -raw bff_app_name)"
            echo "business_service_app_name=$(terraform output -raw business_service_app_name)"
            echo "keycloak_app_name=$(terraform output -raw keycloak_app_name)"
            echo "resource_group_name=$(terraform output -raw resource_group_name)"
          } >> "$GITHUB_OUTPUT"

  # Reconcile the Keycloak `boat-app` realm against infra/keycloak/realm.yaml
  # before deploy-app restarts the BFF. See deploy-staging.yml for the full
  # rationale — same step, production credentials.
  keycloak-config:
    needs: [build-push, apply]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-push.outputs.release_ref }}

      - name: Apply infra/keycloak/realm.yaml
        env:
          KEYCLOAK_FQDN: ${{ needs.apply.outputs.keycloak_fqdn }}
          BFF_FQDN:      ${{ needs.apply.outputs.bff_fqdn }}
          KEYCLOAK_USER: kcadmin
          KEYCLOAK_PASSWORD: ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/infra/keycloak:/config:ro" \
            -e KEYCLOAK_URL="https://${KEYCLOAK_FQDN}" \
            -e KEYCLOAK_USER="${KEYCLOAK_USER}" \
            -e KEYCLOAK_PASSWORD="${KEYCLOAK_PASSWORD}" \
            -e KEYCLOAK_AVAILABILITYCHECK_ENABLED=true \
            -e KEYCLOAK_AVAILABILITYCHECK_TIMEOUT=180s \
            -e IMPORT_FILES_LOCATIONS=/config/realm.yaml,/config/realm.users.demo.yaml \
            -e IMPORT_VARSUBSTITUTION_ENABLED=true \
            -e 'IMPORT_VARSUBSTITUTION_PREFIX=${' \
            -e 'IMPORT_VARSUBSTITUTION_SUFFIX=}' \
            -e BFF_BASE_URL="https://${BFF_FQDN}" \
            -e BFF_JWKS_URL="https://${BFF_FQDN}/.well-known/jwks.json" \
            -e DEMO_PASSWORD=demo123 \
            docker.io/adorsys/keycloak-config-cli:latest-26.5.4

  deploy-app:
    needs: [build-push, apply, keycloak-config]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set new image tag on bff + business-service + keycloak and restart
        env:
          ACR_LOGIN_SERVER: ${{ needs.build-push.outputs.acr_login_server }}
          IMAGE_TAG:        ${{ needs.build-push.outputs.image_tag }}
          RG:               ${{ needs.apply.outputs.resource_group_name }}
          BFF_APP:          ${{ needs.apply.outputs.bff_app_name }}
          BUSINESS_APP:     ${{ needs.apply.outputs.business_service_app_name }}
          KEYCLOAK_APP:     ${{ needs.apply.outputs.keycloak_app_name }}
        run: |
          set -euo pipefail
          # Terraform sets the image tag, but App Service does not always
          # pull the new image without an explicit nudge — same pattern
          # as deploy-staging.yml.
          for app_repo in \
              "${BFF_APP}:bff" \
              "${BUSINESS_APP}:business-service" \
              "${KEYCLOAK_APP}:keycloak"; do
            APP="${app_repo%%:*}"
            REPO="${app_repo##*:}"
            az webapp config container set \
              --resource-group       "${RG}" \
              --name                 "${APP}" \
              --container-image-name "${ACR_LOGIN_SERVER}/${REPO}:${IMAGE_TAG}" \
              --output none
            az webapp restart \
              --resource-group "${RG}" \
              --name           "${APP}" \
              --output none
          done

  smoke:
    needs: [apply, deploy-app]
    runs-on: ubuntu-latest
    steps:
      - name: Probe BFF /actuator/health
        env:
          BFF_FQDN: ${{ needs.apply.outputs.bff_fqdn }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsSL "https://${BFF_FQDN}/actuator/health" | grep -q '"status":"UP"'; then
              echo "BFF healthy after ${i} attempts."
              exit 0
            fi
            echo "Attempt ${i}: not healthy yet, waiting 10s..."
            sleep 10
          done
          echo "::error::BFF /actuator/health did not return UP within 5 min."
          curl -i "https://${BFF_FQDN}/actuator/health" || true
          exit 1
