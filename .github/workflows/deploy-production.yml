# .github/workflows/deploy-production.yml
#
# Production deploy. Triggered ONLY when a GitHub Release is published.
# The release tag (e.g. `v1.0.0`) becomes the immutable image tag and the
# Dependency-Track project version.
#
# Manual approval is enforced by GitHub Environment protection rules
# (Settings → Environments → production → Required reviewers). With the
# phase-4b 3-job restructure that gate now sits on the `apply` job, AFTER
# `plan` has produced and uploaded `tfplan.binary` — reviewers approve
# the exact change-set they can see in the run summary.
#
# Pipeline order — same shape as deploy-staging.yml with these deltas:
#   - Checkout uses the release tag (`ref: ${{ github.event.release.tag_name }}`).
#   - Image tags: `<release-tag>` (immutable), `latest`, `production`.
#   - Terraform applies environments/production.
#   - Ansible runs against inventory/production.yml.
#   - DT projectVersion is the release tag (not the SHA), so DT tracks
#     releases instead of commits in production.
#   - Final job appends a "Deployed: <timestamp>" line to the release body.
#
# Like staging, this workflow has a two-phase apply: `infra-bootstrap`
# creates JUST the ACR (targeted apply) before `build-push` so the very
# first deploy doesn't fail on `az acr login`. `apply` is the second pass
# and pins container apps to the new image tag.
#
# `infra-bootstrap` carries `environment: production` because the OIDC
# federated identity credential for release-triggered runs is bound to
# the `environment:production` subject claim (set up by 00d-bootstrap-
# azure.sh). That means reviewers see TWO approval prompts on the very
# first production deploy — one for bootstrap (creates ACR), one for
# apply (creates everything else). On every subsequent release the
# bootstrap plan is a no-op, but the gate still fires; reviewers see
# "Plan: 0 to add, 0 to change" and click through. We accept that 1
# extra click per release as the price of full automation; the
# alternative is a one-shot manual `terraform apply -target` per env.
#
# Required environment-scoped secrets (GitHub → Settings → Environments →
# production) — see .github/ENVIRONMENTS.md:
#   TF_VAR_postgres_admin_password
#   TF_VAR_bff_db_password
#   TF_VAR_business_db_password
#   TF_VAR_keycloak_db_password
#   TF_VAR_keycloak_admin_password
#   DTRACK_URL          (production DT project — different from staging)
#   DTRACK_API_KEY

name: Deploy to Production

on:
  release:
    types: [published]

# Defaults are read-only. Each job widens for itself; only `annotate-
# release` ever holds `contents: write`, limiting the blast radius if any
# build/push/apply step were ever compromised.
permissions:
  contents: read

# azurerm provider authentication for every terraform-running job.
# `ARM_USE_OIDC=true` switches the provider off CLI auth (which rejects
# service principals) and onto the GitHub-issued OIDC token. The token
# itself is fetched at runtime by the provider via
# ACTIONS_ID_TOKEN_REQUEST_URL/_TOKEN, both of which GHA injects when
# `id-token: write` is granted on the job. See deploy-staging.yml for
# the full rationale.
env:
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

# Serialize per-tag, never cancel mid-apply. Two simultaneous releases of
# DIFFERENT tags can run in parallel (different concurrency keys); same-tag
# re-runs queue.
concurrency:
  group: deploy-production-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI (reuse ci.yml)
    uses: ./.github/workflows/ci.yml
    # Reusable workflows do NOT inherit caller secrets by default. Without
    # this, ci.yml's DT gate, gitleaks license, and any other `secrets.*`
    # reference would resolve to empty strings on release-triggered runs.
    secrets: inherit
    # The reusable workflow's nested jobs (sca-scan, container-scan) need to
    # upload SARIF and read action metadata. The CALLER job's permissions
    # block is the ceiling for the called workflow's jobs — without raising
    # it here the workflow fails to start with "is requesting
    # security-events: write, but is only allowed security-events: none".
    permissions:
      contents: read
      security-events: write
      actions: read

  infra-bootstrap:
    # FIRST PASS of `terraform apply`, scoped to JUST the container registry
    # resource and its AcrPush role binding. See workflow header for the
    # rationale (chicken-and-egg: build-push needs ACR; full apply needs
    # the new image tag, so it has to come AFTER build-push).
    #
    # Carries `environment: production` because the OIDC federated identity
    # for release-triggered runs is `environment:production`-scoped.
    name: Bootstrap ACR (targeted terraform apply)
    needs: [ci]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      # All root-level TF_VAR_* must be set even though the targeted
      # resources don't consume them — Terraform validates the variable
      # surface of the entire root module before honoring -target.
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_postgres_admin_password }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_bff_db_password }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_business_db_password }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_keycloak_db_password }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_keycloak_admin_password }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '1.9.8'
          terraform_wrapper: false

      - name: Terraform init + targeted plan/apply (ACR only)
        working-directory: infra/terraform/environments/production
        # `-lock-timeout=5m` absorbs sub-minute blob-lease overlap with the
        # later `apply` job. Plan-then-apply (not `apply -auto-approve`)
        # gives the production approver something concrete to inspect at
        # the `environment: production` gate — the diff is rendered into
        # the run summary BEFORE apply runs. After the first deploy this
        # diff is "0 to add, 0 to change, 0 to destroy" and the approver
        # clicks through; on first deploy it shows the ACR + AcrPush
        # binding being created.
        run: |
          set -euo pipefail
          terraform init -lock-timeout=5m \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform plan -input=false -lock-timeout=5m -out=tfplan-bootstrap.binary \
            -target='module.boatapp.module.container_registry.azurerm_container_registry.this' \
            -target='module.boatapp.module.container_registry.azurerm_role_assignment.acr_push'
          {
            echo "## ACR bootstrap plan (production)"
            echo '```'
            terraform show -no-color tfplan-bootstrap.binary | head -80
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          terraform apply -input=false -lock-timeout=5m tfplan-bootstrap.binary

  build-push:
    # Build + push images, then sign with cosign (keyless OIDC) and emit a
    # SLSA Build L3 provenance attestation.
    name: Build, push, sign
    needs: [ci, infra-bootstrap]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for `azure/login@v2` + cosign keyless + attestations
      contents: read
      attestations: write   # required by actions/attest-build-provenance
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    outputs:
      bff_digest: ${{ steps.bff_push.outputs.digest }}
      business_digest: ${{ steps.business_push.outputs.digest }}
      keycloak_digest: ${{ steps.keycloak_push.outputs.digest }}
    steps:
      # Pin the checkout to the release tag — the tag is the source of
      # truth for production. If main has moved on since the tag was
      # cut, we still build the tagged code.
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ACR name is owned by Terraform — see modules/container-registry/main.tf
      # (`registry_name = replace("${project_name}${environment}acr","-","")`)
      # and environments/production/main.tf (project_name = "boatapp"). The
      # literal below mirrors that formula for production; staging has its own
      # workflow with its own literal. Single source of truth = TF.
      #
      # `loginServer` is deterministically `<name>.azurecr.io` for the public
      # Azure cloud — no `az acr show` round-trip needed.
      - name: Compute image references
        run: |
          set -euo pipefail
          ACR_LOGIN="boatappproductionacr.azurecr.io"
          {
            echo "ACR_LOGIN=${ACR_LOGIN}"
            echo "BFF_IMAGE=${ACR_LOGIN}/bff"
            echo "BUSINESS_IMAGE=${ACR_LOGIN}/business-service"
            echo "KEYCLOAK_IMAGE=${ACR_LOGIN}/keycloak"
          } >> "$GITHUB_ENV"

      - name: ACR login
        run: az acr login --name "boatappproductionacr"

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      # Three tags per image:
      #   - <release-tag>   immutable; what Terraform pins to
      #   - latest          rolling, for ad-hoc pulls
      #   - production      rolling, mirrors what's currently deployed
      - name: Build & push bff image
        id: bff_push
        uses: ./.github/actions/docker-build-push
        with:
          dockerfile: bff/Dockerfile
          image: ${{ env.BFF_IMAGE }}
          tags: |
            ${{ env.RELEASE_TAG }}
            latest
            production

      - name: Cosign sign bff image
        env:
          IMAGE: ${{ env.BFF_IMAGE }}
          DIGEST: ${{ steps.bff_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance for bff
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-name: ${{ env.BFF_IMAGE }}
          subject-digest: ${{ steps.bff_push.outputs.digest }}
          push-to-registry: true

      - name: Build & push business-service image
        id: business_push
        uses: ./.github/actions/docker-build-push
        with:
          dockerfile: business-service/Dockerfile
          image: ${{ env.BUSINESS_IMAGE }}
          tags: |
            ${{ env.RELEASE_TAG }}
            latest
            production

      - name: Cosign sign business-service image
        env:
          IMAGE: ${{ env.BUSINESS_IMAGE }}
          DIGEST: ${{ steps.business_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance for business-service
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-name: ${{ env.BUSINESS_IMAGE }}
          subject-digest: ${{ steps.business_push.outputs.digest }}
          push-to-registry: true

      # Keycloak is built from keycloak/Dockerfile (NOT pulled from
      # quay.io). The Dockerfile bakes `kc.sh build --db=postgres` into
      # the image so the Container App can launch with `start
      # --optimized` — without the bake the optimized launcher crashes
      # with "Unable to find the database vendor".
      - name: Build & push keycloak image
        id: keycloak_push
        uses: ./.github/actions/docker-build-push
        with:
          context: keycloak
          dockerfile: Dockerfile
          image: ${{ env.KEYCLOAK_IMAGE }}
          tags: |
            ${{ env.RELEASE_TAG }}
            latest
            production

      - name: Cosign sign keycloak image
        env:
          IMAGE: ${{ env.KEYCLOAK_IMAGE }}
          DIGEST: ${{ steps.keycloak_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance for keycloak
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-name: ${{ env.KEYCLOAK_IMAGE }}
          subject-digest: ${{ steps.keycloak_push.outputs.digest }}
          push-to-registry: true

  plan:
    # Run terraform plan from the tagged commit and persist the binary
    # plan as an artifact so the apply job applies it verbatim.
    #
    # Carries `environment: production` for two reasons:
    #   1. The TF_VAR_* secrets are scoped to the production environment,
    #      not the repo — without the claim they resolve to empty.
    #   2. The OIDC FIC for release-triggered runs is `environment:
    #      production`-scoped (see 00d-bootstrap-azure.sh); without the
    #      claim azure/login can't match a federated credential.
    # Side effect: the Required-Reviewer rule fires on this job too, so a
    # production deploy now requires THREE approvals (bootstrap, plan,
    # apply). That's the cost of full first-deploy automation; the
    # alternative is a one-time manual `terraform apply -target` per env.
    name: Terraform plan (production)
    needs: [build-push]
    runs-on: ubuntu-latest    # public Azure storage backend; VNet-runner out of scope for 4b
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_postgres_admin_password }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_bff_db_password }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_business_db_password }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_keycloak_db_password }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_keycloak_admin_password }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '1.9.8'
          terraform_wrapper: false

      - name: Terraform init (production)
        working-directory: infra/terraform/environments/production
        run: |
          set -euxo pipefail
          terraform init -lock-timeout=5m \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"

      - name: Terraform plan (production)
        working-directory: infra/terraform/environments/production
        run: |
          set -euxo pipefail
          terraform plan -out=tfplan.binary -input=false -lock-timeout=5m \
            -var "bff_image_tag=${RELEASE_TAG}" \
            -var "business_service_image_tag=${RELEASE_TAG}" \
            -var "keycloak_image_tag=${RELEASE_TAG}"
          ls -la tfplan.binary

      - name: Terraform show -json (production)
        working-directory: infra/terraform/environments/production
        run: |
          set -euxo pipefail
          terraform show -json tfplan.binary > tfplan.json
          ls -la tfplan.json

      - name: Render plan summary
        # `comment-on-pr` left at its default — the composite already gates
        # the comment step on `event_name == 'pull_request'`.
        uses: ./.github/actions/terraform-plan-summary
        with:
          plan-json: infra/terraform/environments/production/tfplan.json

      - name: Upload terraform plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            infra/terraform/environments/production/tfplan.binary
            infra/terraform/environments/production/tfplan.json
          retention-days: 90
          if-no-files-found: error

  apply:
    # Apply the EXACT plan from the artifact, then run post-deploy steps.
    # Carries `environment: production` so the Required-Reviewer rule
    # fires AFTER the plan is uploaded — reviewers approve the diff
    # they can see in the run summary, not a blank-cheque deploy.
    name: Terraform apply + post-deploy (production)
    needs: [build-push, plan]
    runs-on: ubuntu-latest    # public Azure storage backend; VNet-runner out of scope for 4b
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_postgres_admin_password }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_bff_db_password }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_business_db_password }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_keycloak_db_password }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_keycloak_admin_password }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '1.9.8'
          terraform_wrapper: false

      - name: Download tfplan artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tfplan-${{ github.run_id }}
          path: infra/terraform/environments/production/

      - name: Terraform init + apply (verbatim from artifact)
        working-directory: infra/terraform/environments/production
        # `-lockfile=readonly` makes the apply fail loudly if the provider
        # lockfile changed between plan and apply (e.g. a Dependabot bump
        # landed during the approval window).
        run: |
          set -euo pipefail
          terraform init -lockfile=readonly \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve tfplan.binary

      - name: Setup Ansible
        run: |
          set -euo pipefail
          python -m pip install --upgrade 'pip==24.*'
          pip install 'ansible-core==2.17.*'
      - name: Ansible post-deploy (production)
        working-directory: infra/ansible
        run: |
          ansible-playbook -i inventory/production.yml playbooks/deploy.yml \
            --tags migrate,configure,health

      - name: Smoke health-check against production FQDN
        working-directory: infra/terraform/environments/production
        run: |
          set -euo pipefail
          BFF_FQDN=$(terraform output -raw bff_fqdn)
          echo "Polling https://${BFF_FQDN}/actuator/health"
          for i in $(seq 1 30); do
            if curl -sfo /dev/null --max-time 5 "https://${BFF_FQDN}/actuator/health"; then
              echo "  healthy after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "::error::BFF at https://${BFF_FQDN} failed to become healthy after 150s"
          exit 1

      - uses: ./.github/actions/setup-java
      - name: Download bff SBOM from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bff-sbom
          path: bff/target/
      - name: Download business-service SBOM from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: business-service-sbom
          path: business-service/target/
      - name: Upload bff SBOM to Dependency-Track
        working-directory: bff
        env:
          DTRACK_URL:     ${{ secrets.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          ./mvnw -B -ntp dependency-track:upload-bom \
            -Ddtrack.skip=false \
            -Ddependency-track.url="${DTRACK_URL}" \
            -Ddependency-track.apiKey="${DTRACK_API_KEY}" \
            -Ddependency-track.projectName=boatapp-bff \
            -Ddependency-track.projectVersion="${RELEASE_TAG}"
      - name: Upload business-service SBOM to Dependency-Track
        working-directory: business-service
        env:
          DTRACK_URL:     ${{ secrets.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          ./mvnw -B -ntp dependency-track:upload-bom \
            -Ddtrack.skip=false \
            -Ddependency-track.url="${DTRACK_URL}" \
            -Ddependency-track.apiKey="${DTRACK_API_KEY}" \
            -Ddependency-track.projectName=boatapp-business-service \
            -Ddependency-track.projectVersion="${RELEASE_TAG}"

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## Production deploy FAILED"
            echo ""
            echo "- Release: \`${RELEASE_TAG}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Separate job so `contents: write` is scoped to the single step that
  # needs it. Every preceding step (build/push/sign/Terraform/Ansible)
  # runs without write access to the repo, limiting damage if any tool
  # in that chain were compromised.
  annotate-release:
    name: Annotate release with deployment status
    needs: [apply]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Append deployment line to release body
        # Uses `gh release edit`'s --notes-file form to merge the
        # original body with a new trailing line — robust against
        # release notes that contain backticks or quotes which would
        # break a `--notes "$STRING"` argument.
        run: |
          set -euo pipefail
          ORIG_NOTES=$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json body -q .body)
          DEPLOYED_AT=$(date -u +%FT%TZ)
          NOTES_FILE=$(mktemp)
          {
            printf '%s\n\n' "${ORIG_NOTES}"
            printf -- '---\n'
            printf 'Deployed to production at `%s` (run %s/%s/actions/runs/%s).\n' \
              "${DEPLOYED_AT}" "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}"
          } > "${NOTES_FILE}"
          gh release edit "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --notes-file "${NOTES_FILE}"
