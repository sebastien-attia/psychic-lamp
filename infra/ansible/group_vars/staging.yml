---
# Staging-specific values.
#
# `terraform_outputs` is a fact set in playbooks/deploy.yml pre_tasks from
# `terraform -chdir=../../terraform output -json`. Variables below are lazy
# templates that reference it — they resolve when first read by a task, not
# at inventory-load time.

# ── Resolved from Terraform outputs ─────────────────────────────────────────
resource_group: "{{ terraform_outputs.resource_group_name.value }}"
acr_login_server: "{{ terraform_outputs.acr_login_server.value }}"
keyvault_name: "{{ terraform_outputs.keyvault_uri.value | regex_replace('https://([^.]+)\\..*', '\\1') }}"
postgres_fqdn: "{{ terraform_outputs.postgres_fqdn.value }}"
postgres_admin_username: "{{ terraform_outputs.postgres_admin_username.value }}"
bff_public_fqdn: "{{ terraform_outputs.bff_fqdn.value }}"
business_service_internal_fqdn: "{{ terraform_outputs.business_service_internal_fqdn.value }}"
keycloak_fqdn: "{{ terraform_outputs.keycloak_fqdn.value }}"
liquibase_job_names: "{{ terraform_outputs.liquibase_job_names.value }}"
# jdbc_urls is derived locally because root outputs.tf doesn't currently
# expose `module.database.jdbc_urls`. Database names are stable across envs
# (per project conventions). When TF adds a root `jdbc_urls` output, replace
# this with `terraform_outputs.jdbc_urls.value` and drop the derivation.
jdbc_urls:
  bff_session: "jdbc:postgresql://{{ postgres_fqdn }}:5432/bff_session?sslmode=require"
  boatapp: "jdbc:postgresql://{{ postgres_fqdn }}:5432/boatapp?sslmode=require"
  keycloak: "jdbc:postgresql://{{ postgres_fqdn }}:5432/keycloak?sslmode=require"

# ── Spring profile ──────────────────────────────────────────────────────────
spring_profiles_active: staging

# ── Staging-only feature toggles ────────────────────────────────────────────
deploy_demo_user: true        # seed the `demo` user in Keycloak
ssl_setup_enabled: false      # bff fqdn served by *.azurecontainerapps.io cert
monitoring_enabled: true
