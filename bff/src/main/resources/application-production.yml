# BFF production profile — same shape as staging, production URLs / secrets only.
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_FQDN}:5432/${BFF_DB_NAME:bff_session}?sslmode=require
    username: ${BFF_DB_USER}
    password: ${BFF_DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-authentication-method: private_key_jwt
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            scope:
              - openid
              - profile
              - email
              - offline_access
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI}
            user-name-attribute: preferred_username

bff:
  signing-key:
    # Empty default — see application-staging.yml for the rationale.
    pem: ${BFF_SIGNING_KEY_PEM:}
    id: ${BFF_SIGNING_KEY_ID}

business-service:
  url: ${BUSINESS_SERVICE_URL}

server:
  servlet:
    session:
      cookie:
        secure: true
