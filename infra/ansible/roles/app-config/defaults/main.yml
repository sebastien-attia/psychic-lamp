---
# Defaults for the app-config role.
# These can be overridden per-environment via group_vars/.

# Container registry / image tags are inherited from group_vars/all.yml; this
# role only adds role-specific knobs.

# Whether the role updates Keycloak's container app on every run. Some teams
# prefer to manage Keycloak independently; flip to false to skip update-keycloak.
app_config_update_keycloak: true

# Internal cluster URL the BFF uses to reach the business-service container app.
# Stable across envs because Container Apps Environment names resolve internally.
app_config_business_service_url: "http://{{ container_app_business_service }}"

# KEYCLOAK_PROXY_HEADERS: behind Container Apps' HTTP/2 ingress this must be
# `xforwarded` so Keycloak honours the X-Forwarded-* headers for redirects.
app_config_kc_proxy_headers: xforwarded
