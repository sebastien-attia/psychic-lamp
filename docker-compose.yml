# docker-compose.yml — local-intg full stack.
#
# !!! LOCAL-INTG ONLY — DO NOT REUSE FOR STAGING / PRODUCTION !!!
# Keycloak runs in `start-dev` mode (HTTP, ephemeral signing keys, dev
# defaults) and the keycloak-config sidecar authenticates with the master
# realm admin credentials. Both are appropriate for local-intg only.
# Staging/prod are deployed via Terraform (02c2) + Ansible (02c3) — that
# path uses `start --optimized` with HTTPS, an explicit hostname, and a
# scoped realm-admin service account; it does NOT consume this compose
# file. The shared artefact across environments is infra/keycloak/realm.yaml.
#
# Usage: docker compose up
# Starts: postgres + keycloak + keycloak-config (sidecar) + business-service +
#         bff + frontend-codegen (sidecar) + frontend (Vite dev server)
#
# Browser: open http://localhost:5173 — the `frontend` service runs Vite in
#   `local-intg` mode and proxies /api, /oauth2, /login, /logout to the BFF
#   over the compose network (VITE_BFF_TARGET=http://bff:8080). The SPA is
#   not baked into the BFF image; in staging/prod it lives on Azure Static
#   Web Apps. The host-run path (`cd frontend && npm run dev:intg`) still
#   works — it falls back to http://localhost:8080 when VITE_BFF_TARGET is
#   unset.
# BFF (Spring Cloud Gateway, OAuth2/session/CSRF + TokenRelay to BS):
#                                          http://localhost:8080
# Business Service API (internal only):    http://localhost:8081  (not for browser use)
# Keycloak admin (debug only):             http://localhost:8180
# All host-published ports are bound to 127.0.0.1 so the local-intg stack
# is not reachable from the LAN even if the workstation has no firewall.
#
# Prereq for first run: NONE for the compose path. The `bff-keygen` init
# service below generates the BFF signing key into the `bff-signing-key`
# named volume on first `docker compose up` and is a no-op on subsequent
# runs (idempotent). The `bff` service reads the key from the same volume
# (mounted read-only at /run/secrets/), so ordering is enforced by
# `depends_on: bff-keygen { condition: service_completed_successfully }`.
# A host bind-mount cannot be used here: Compose validates `secrets: file:`
# sources at container-create time, which runs before bff-keygen can
# generate the file — that's why we share via a named volume instead.
# The standalone ai-scripts/00b-generate-bff-key.sh is still kept for the
# IDE-run BFF case (OUT=./bff/src/main/resources/keys).
#
# To re-run the Postgres init script after editing it: docker compose down -v
# (the script only runs on an empty data volume — see infra/postgres/init/01-init-dbs.sh).
#
# To force-regenerate the BFF signing key (e.g. after a Keycloak realm
# wipe leaves a stale JWKS reference): `docker volume rm
# <project>_bff-signing-key` and re-run `docker compose up`. `down -v`
# also wipes it, but that nukes the Postgres volume too.
services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs ONLY on first boot of postgres-data (empty volume). If you
      # change 01-init-dbs.sh, run `docker compose down -v` to re-run it.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      # Admin role used ONLY for provisioning (docker-entrypoint init).
      # Application services never log in as it.
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-changeme}
      POSTGRES_DB: postgres
      # Per-role passwords consumed by 01-init-dbs.sh to create LOGIN roles.
      BFF_DB_PASSWORD: ${BFF_DB_PASSWORD:-bff}
      BUSINESS_DB_PASSWORD: ${BUSINESS_DB_PASSWORD:-business_service}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    # No --import-realm. Realm config is applied declaratively by the
    # keycloak-config sidecar below (reads infra/keycloak/realm.yaml).
    command: start-dev
    # Two narrow bindings:
    # - 127.0.0.1 lets the host browser reach Keycloak via
    #   http://localhost:8180 (and via keycloak.localtest.me:8180,
    #   which public DNS resolves to 127.0.0.1).
    # - 172.17.0.1 is the address that `extra_hosts: host-gateway`
    #   resolves to from inside the BFF / business-service containers
    #   on a default Linux Docker bridge, so they can fetch OIDC
    #   discovery from the same KC_HOSTNAME the browser uses (Spring
    #   requires a single issuer URI for both paths).
    # Avoid binding 0.0.0.0 — Keycloak admin would then be reachable
    # from any external interface on the dev box.
    #
    # PORTABILITY: 172.17.0.1 is Linux-default-bridge specific. On
    # Docker Desktop (macOS / Windows) and on Linux installs that have
    # changed the default bridge subnet, this bind will fail with
    # "cannot assign requested address". For those environments,
    # override the second binding via your own compose override file
    # (e.g. compose.override.yml) or replace it with the gateway IP
    # reported by `docker network inspect bridge | jq '.[0].IPAM.Config[0].Gateway'`.
    ports:
      - "127.0.0.1:8180:8080"
      - "172.17.0.1:8180:8080"
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      # Keycloak 26.x exposes /health/* on the Quarkus management interface
      # (port 9000), not on the request port 8080. The image ships without
      # curl/wget, so probe via bash's /dev/tcp builtin (CMD form, not
      # CMD-SHELL — /bin/sh on UBI does not implement /dev/tcp).
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/9000 && printf "GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && grep -q ''"status": "UP"'' <&3'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      # Master-realm admin credentials. Defaults are LOCAL-INTG ONLY (see
      # the file header). The :- form keeps `docker compose config` working
      # without a .env file (used by the verification gate); .env.example
      # ships a real value developers should override.
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      # Frontchannel hostname seen by the *browser* in OIDC discovery
      # metadata, the `iss` claim, and OAuth2 redirects. The browser runs
      # on the developer's host and reaches Keycloak through the
      # published port mapping `127.0.0.1:8180:8080` below — Docker's
      # internal DNS name `keycloak` is unreachable outside the compose
      # network, so without this override the SPA gets ERR_NAME_NOT_RESOLVED
      # the moment the BFF redirects it through Spring's authorization-uri.
      #
      # Why `keycloak.localtest.me` and not `localhost`? Spring's OAuth2
      # client requires its configured `issuer-uri` to equal the issuer
      # field returned by OIDC discovery (= KC_HOSTNAME). The BFF must
      # therefore *also* be able to reach this URL from inside its
      # container so it can fetch /.well-known/openid-configuration at
      # startup. `localhost` is already pinned to 127.0.0.1 by the base
      # /etc/hosts in the JRE image and `extra_hosts` cannot dislodge
      # that first match — the BFF would resolve `localhost` to its own
      # loopback (where nothing listens on 8180) and crash with
      # ConnectException at startup. `keycloak.localtest.me` resolves to
      # 127.0.0.1 globally via public DNS (so the browser is happy) AND
      # is unknown to /etc/hosts (so the BFF's `extra_hosts` mapping to
      # the host gateway wins cleanly). One name, both paths.
      KC_HOSTNAME: http://keycloak.localtest.me:8180
      # Backchannel-dynamic = true keeps in-network calls (BFF → Keycloak
      # for token-exchange, JWKS, userinfo) on the request URL
      # `http://keycloak:8080`, so we don't have to round-trip every
      # backchannel request through the host's loopback. Frontchannel
      # URLs (auth, end-session, iss) still use KC_HOSTNAME above.
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"

  # Short-lived sidecar: applies infra/keycloak/realm.yaml against the live
  # Keycloak admin endpoint. Idempotent (create-or-update). The same YAML
  # is reused by Ansible in staging/prod (see ai-scripts/02c3-ansible.md).
  keycloak-config:
    image: docker.io/adorsys/keycloak-config-cli:latest-26.5.4
    depends_on:
      keycloak: { condition: service_healthy }
    restart: "no"
    volumes:
      - ./infra/keycloak:/config:ro
    # BFF_BASE_URL / BFF_JWKS_URL come from the per-env file (single
    # source of truth shared with Ansible). The remaining variables are
    # secrets/credentials that don't belong in a committed env file.
    env_file:
      - ./infra/keycloak/env/local-intg.env
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      # Base realm + local-intg user overlay. The overlay is local-intg
      # only and is NEVER imported by Ansible in staging/prod.
      IMPORT_FILES_LOCATIONS: /config/realm.yaml,/config/realm.users.local-intg.yaml
      # Property is `import.var-substitution.enabled` (kebab-case). Spring
      # relaxed binding maps it to `IMPORT_VARSUBSTITUTION_ENABLED` — note
      # NO underscore between VAR and SUBSTITUTION. The plausible-looking
      # `IMPORT_VAR_SUBSTITUTION_ENABLED` is silently ignored, leaving the
      # default (false), which causes ${BFF_BASE_URL} to be POSTed to
      # Keycloak verbatim and rejected as "invalid_input: A redirect URI
      # is not a valid URI".
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      # Default delimiters in keycloak-config-cli are `$(`/`)`. Override to
      # the conventional `${...}` syntax used in realm.yaml so the same file
      # reads naturally as a shell/Spring template.
      # `$$` escapes the dollar so compose passes a literal `${` through to
      # the container (compose's own variable interpolation runs first).
      IMPORT_VARSUBSTITUTION_PREFIX: '$${'
      IMPORT_VARSUBSTITUTION_SUFFIX: '}'
      DEMO_PASSWORD: ${DEMO_PASSWORD:-demo123}

  # One-shot init container: generates the BFF's RSA signing key on first
  # boot if missing, then exits. Idempotent — subsequent `docker compose up`
  # runs see the existing PEM and skip. This is what makes the project
  # bootable with a single `docker compose up` (no manual key-gen step).
  # Mirrors ai-scripts/00b-generate-bff-key.sh, which is retained for the
  # IDE-run BFF case (OUT=./bff/src/main/resources/keys).
  bff-keygen:
    image: alpine:3.20
    # Defence-in-depth: this short-lived container does nothing but write
    # one PEM into a named volume — it has no business with capabilities,
    # privilege escalation, or anything beyond a writable /keys mount.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: "no"
    volumes:
      - bff-signing-key:/keys
    entrypoint: ["/bin/sh", "-c"]
    # Mode 0644 (world-readable) is intentional: the BFF container runs as
    # uid 1001 (`spring`) which differs from this container's root uid.
    # The named volume preserves the file mode set here. Local-intg only —
    # staging/prod source the key from Azure Key Vault.
    command:
      - |
        set -eu
        if [ -f /keys/bff-signing-key.pem ]; then
          echo "▸ /keys/bff-signing-key.pem already present — skipping."
          exit 0
        fi
        apk add --no-cache openssl >/dev/null
        echo "▸ Generating RSA 2048 PKCS#8 PEM at /keys/bff-signing-key.pem..."
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
          -out /keys/bff-signing-key.pem
        chmod 0644 /keys/bff-signing-key.pem

  business-service:
    build:
      context: .
      dockerfile: business-service/Dockerfile
    ports: ["127.0.0.1:8081:8081"]
    depends_on:
      postgres: { condition: service_healthy }
      keycloak: { condition: service_healthy }
    # Spring resource-server validates the JWT `iss` claim against
    # whatever Keycloak announces via KC_HOSTNAME — the same URL the
    # browser uses for the auth dialog. That URL must resolve from
    # inside the container so Spring can fetch OIDC discovery at
    # startup. The host-gateway remap routes the lookup to the host's
    # published port (127.0.0.1:8180:8080) — see the KC_HOSTNAME comment
    # in the keycloak service for why we cannot use `localhost` here.
    extra_hosts:
      - "keycloak.localtest.me:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      SPRING_PROFILES_ACTIVE: local-intg
      # Force IPv4: public DNS returns AAAA `::1` for keycloak.localtest.me
      # in addition to the A record `127.0.0.1`. The container's
      # extra_hosts override above injects only an IPv4 entry into
      # /etc/hosts, so the IPv6 AAAA still leaks in via DNS and the JVM
      # prefers it — Java then connects to ::1:8180 (the container's own
      # IPv6 loopback) and gets ECONNREFUSED. preferIPv4Stack=true
      # silences the AAAA path entirely.
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      DATABASE_URL: jdbc:postgresql://postgres:5432/${BUSINESS_DB_NAME:-boatapp}
      DATABASE_USERNAME: ${BUSINESS_DB_USER:-business_service}
      DATABASE_PASSWORD: ${BUSINESS_DB_PASSWORD:-business_service}
      KEYCLOAK_ISSUER_URI: http://keycloak.localtest.me:8180/realms/boat-app

  bff:
    build:
      context: .
      dockerfile: bff/Dockerfile
    ports: ["127.0.0.1:8080:8080"]
    depends_on:
      # bff-keygen runs to completion BEFORE this container starts, so the
      # PEM exists in the shared `bff-signing-key` named volume by the time
      # the read-only mount below is materialised.
      bff-keygen:       { condition: service_completed_successfully }
      postgres:         { condition: service_healthy }
      business-service: { condition: service_healthy }
      keycloak:         { condition: service_healthy }
    # See business-service: same KEYCLOAK_ISSUER_URI = localhost:8180
    # alignment with KC_HOSTNAME, same /etc/hosts override so Spring's
    # OAuth2 client can fetch OIDC discovery from the announced issuer.
    extra_hosts:
      - "keycloak.localtest.me:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: local-intg
      # See business-service for why preferIPv4Stack=true is required
      # alongside the keycloak.localtest.me extra_hosts override.
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
      # BFF's own bff_session database (owned by role `bff`). Liquibase in
      # BFF creates SPRING_SESSION on startup. No access to boatapp or
      # keycloak DBs (per-DB CONNECT grants in 01-init-dbs.sh).
      DATABASE_URL: jdbc:postgresql://postgres:5432/${BFF_DB_NAME:-bff_session}
      DATABASE_USERNAME: ${BFF_DB_USER:-bff}
      DATABASE_PASSWORD: ${BFF_DB_PASSWORD:-bff}
      BUSINESS_SERVICE_URL: http://business-service:8081
      # Must match Keycloak's KC_HOSTNAME so Spring's discovery
      # validation (configured issuer == discovery issuer) succeeds.
      # The browser uses this URL too — single source of truth.
      KEYCLOAK_ISSUER_URI: http://keycloak.localtest.me:8180/realms/boat-app
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-boat-app-confidential}
      # private_key_jwt — no shared secret. The PEM is mounted from the
      # `bff-signing-key` named volume (populated by the bff-keygen init
      # service) and the public half is served by the BFF at
      # /.well-known/jwks.json for Keycloak (use.jwks.url=true on the
      # client) to fetch.
      BFF_SIGNING_KEY_PATH: /var/lib/bff-keys/bff-signing-key.pem
      BFF_SIGNING_KEY_ID: ${BFF_SIGNING_KEY_ID:-bff-key-1}
    volumes:
      # Neutral mount path — deliberately NOT /run/secrets, which is the
      # tmpfs Compose materialises any future `secrets:` entries into.
      # Overlaying a named volume on top of that reserved path would
      # silently shadow real secrets the next time someone adds one.
      # The volume is populated by the `bff-keygen` init service; the BFF
      # container runs as uid 1001 (`spring`, see bff/Dockerfile), and
      # bff-keygen writes the PEM mode 0644 so that uid can read it.
      - bff-signing-key:/var/lib/bff-keys:ro

  # One-shot init container: regenerates the SPA's TypeScript API client from
  # contracts/openapi.yaml on every `up`. The generator
  # (@openapitools/openapi-generator-cli) shells out to a Java process — so
  # this image carries Node AND a JRE (installed via apk on cold start, ~5s
  # after the package mirror is cached). The npm install step is skipped when
  # node_modules is already populated (the named volume `frontend-node-modules`
  # persists across `down`); generate:api always runs so a change to
  # contracts/openapi.yaml is picked up on the next `up`.
  #
  # Capability note: unlike `bff-keygen` (which writes to a Docker-managed
  # named volume and can safely run with `cap_drop: [ALL]`), this service
  # writes generated TS into the host bind-mount `./frontend`. Stripping
  # CAP_DAC_OVERRIDE would block that write because the bind-mount is
  # owned by the host user, not container root. We keep the default Docker
  # capability set (already a small subset of full root) and only retain
  # `no-new-privileges` to forbid setuid escalation inside the container.
  frontend-codegen:
    image: node:22-alpine
    security_opt:
      - no-new-privileges:true
    restart: "no"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./contracts:/contracts:ro
      - frontend-node-modules:/app/node_modules
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        # apk output is intentionally NOT silenced — if the Alpine package
        # mirror is unreachable (corporate VPN, flight, CI cache miss), the
        # error must surface in the codegen log instead of being swallowed.
        # The package name itself pins us to OpenJDK 21.
        apk add --no-cache openjdk21-jre-headless
        # Files written below land on the host bind-mount with root ownership
        # (this container runs as container-root). Devs cleaning up by hand
        # may need `sudo rm -rf frontend/node_modules` outside docker.
        if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.json ]; then
          echo "▸ Installing frontend npm dependencies (first run)..."
          npm ci --no-audit --no-fund --prefer-offline
        else
          echo "▸ node_modules already populated — skipping npm ci."
        fi
        echo "▸ Generating SPA TypeScript API client from contracts/openapi.yaml..."
        npm run generate:api

  # Long-running Vite dev server for the SPA. Serves at http://localhost:5173
  # and proxies /api, /oauth2, /login, /logout to the BFF on the compose
  # network (VITE_BFF_TARGET=http://bff:8080 — the in-container override of
  # vite.config.ts's host-run default of http://localhost:8080).
  # CHOKIDAR_USEPOLLING=true is needed because inotify events from a Linux
  # host bind mount are not reliably propagated into the container — without
  # it, file edits don't trigger HMR.
  frontend:
    image: node:22-alpine
    security_opt:
      - no-new-privileges:true
    ports: ["127.0.0.1:5173:5173"]
    working_dir: /app
    depends_on:
      frontend-codegen: { condition: service_completed_successfully }
      # `service_healthy` (not `service_started`): the BFF defines a
      # HEALTHCHECK in its Dockerfile, so compose will wait until /actuator
      # /health returns 200 before starting Vite. Without that gate, the
      # SPA's first hit to /api/me / /oauth2/* through the proxy would race
      # the BFF and surface as a 502 to the developer.
      bff:              { condition: service_healthy }
    healthcheck:
      # Vite serves the SPA bootstrap HTML at `/`. wget ships with Alpine's
      # busybox, so no extra package install is needed for the probe.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      # Where the Vite proxy actually sends bytes (compose-network DNS):
      VITE_BFF_TARGET: http://bff:8080
      # What the BFF sees as `Host:` so Spring Security's OAuth2 client
      # builds a `redirect_uri` the browser can follow back. Without this
      # override, Spring would build `http://bff:8080/login/oauth2/code/...`
      # — unresolvable outside the docker network.
      VITE_BFF_PUBLIC_HOST: localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        # Defensive: codegen has populated node_modules, but cover the case
        # where someone deletes the named volume without re-running codegen.
        if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock.json ]; then
          npm ci --no-audit --no-fund --prefer-offline
        fi
        exec npx vite --mode local-intg --host 0.0.0.0 --port 5173

volumes:
  postgres-data:
  # Shared between bff-keygen (writer) and bff (reader). Persists across
  # `docker compose down` so the key is generated only once. Wipe with
  # `docker compose down -v` to force regeneration.
  bff-signing-key:
  # Shared between frontend-codegen (writer) and frontend (reader). Persists
  # across `docker compose down` so `npm ci` only runs on first up. Wipe with
  # `docker volume rm <project>_frontend-node-modules` to force a clean
  # reinstall (e.g. after editing frontend/package.json).
  frontend-node-modules:
