# Creates APP_USER — synced from JWT claims on every authenticated request.
# `keycloak_id` carries the JWT `sub` claim and is the upsert key.
databaseChangeLog:
  - changeSet:
      id: 001-create-app-user-table
      author: boatapp
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: keycloak_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_app_user_keycloak_id
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(320)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(255)
              - column:
                  name: last_name
                  type: VARCHAR(255)
              - column:
                  name: first_login
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: last_login
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
