# i18n source for ProblemDetail.detail and ProblemDetail.messages[].message.
#
# Mirrors business-service/src/main/resources/messages.properties verbatim
# so locally-raised 400 responses and forwarded upstream responses share an
# identical wire shape.
#
# Resolved by GlobalExceptionHandler against LocaleContextHolder.getLocale();
# the response carries Content-Language with the resolved locale. Add
# messages_de.properties / messages_fr.properties (etc.) without code changes.
#
# {0} is the dotted field path (e.g. "Boat.name") supplied by the handler.

# ── Syntactic / Jakarta-mapped application codes ────────────────────────────
field.required={0} is required
field.size.invalid={0} has an invalid size
field.range.invalid={0} is out of range
field.email.invalid={0} is not a valid email
field.format.invalid={0} has an invalid format
field.invalid={0} is invalid

# ── Semantic / domain codes (extend as new business rules are added) ────────
boat.name.duplicate=Boat name already exists

# ── Request-level codes ─────────────────────────────────────────────────────
request.body.malformed=Request body is malformed or unreadable
request.header.if-match.required=The If-Match header is required for this operation
auth.required=Authentication is required to access this resource

# ── BFF-specific ────────────────────────────────────────────────────────────
upstream.failure=The upstream service is unavailable
not.found.resource=The requested resource does not exist

# ── Fallback ────────────────────────────────────────────────────────────────
internal.error=An unexpected internal error occurred
