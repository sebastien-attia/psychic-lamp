name: Deploy — production

# Trigger: push to `main` (typically a merge of staging → main).
#
# Manual gate: the `apply` job runs in the GitHub Environment "production",
# which has Required Reviewers configured. The `plan` job runs without a
# gate so reviewers see the diff they're approving inside the run summary.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production-${{ github.sha }}
  cancel-in-progress: false

env:
  AZURE_LOCATION: switzerlandnorth
  PROJECT_NAME: boatapp
  ENVIRONMENT: production
  TF_DIR: infra/terraform/environments/production

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  preflight-envs:
    # Fail fast and loud if `production-bootstrap` does not exist on the
    # repo yet (e.g. on a clone where 00d-bootstrap-azure.sh + 00f-generate
    # -db-secrets.sh have not been re-run since the dual-env design landed).
    # Without this guard, every downstream job would trip an opaque
    # "Value 'production-bootstrap' is not valid" error mid-run, AND the
    # OIDC token would lack the matching environment claim — operators
    # would burn time guessing. The actuator here is the existence check;
    # the same operator step that creates the env (00d) also seeds the
    # mirrored secrets (00f), so passing this gate implies both are done.
    name: Preflight — required GitHub Environments
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify production + production-bootstrap envs exist
        run: |
          set -euo pipefail
          for env in production production-bootstrap; do
            if ! gh api "repos/${GITHUB_REPOSITORY}/environments/${env}" >/dev/null 2>&1; then
              echo "::error::GitHub Environment '${env}' does not exist on ${GITHUB_REPOSITORY}." >&2
              echo "::error::Re-run ai-scripts/00d-bootstrap-azure.sh AND ai-scripts/00f-generate-db-secrets.sh before deploying." >&2
              exit 1
            fi
            echo "✓ env present: ${env}"
          done

  infra-bootstrap:
    # FIRST PASS of `terraform apply`, scoped to JUST the container registry
    # resource and its AcrPush role binding. See workflow header for the
    # rationale (chicken-and-egg: build-push needs ACR; full apply needs
    # the new image tag, so it has to come AFTER build-push).
    #
    # Carries `environment: production-bootstrap` (NOT `production`) so the
    # Required-Reviewer rule on `production` does NOT fire here. Bootstrap
    # creates the ACR and an idempotent role assignment — small blast
    # radius, run on every release. Forcing a reviewer click on it would
    # mean THREE approvals per release (bootstrap + plan + apply) for no
    # security gain. The actual `terraform apply` of the full stack stays
    # gated on `environment: production` (see the `apply` job).
    # `production-bootstrap` is its own GitHub Environment with NO
    # protection rules; its OIDC FIC subject is
    # `repo:<owner>/<repo>:environment:production-bootstrap` (see
    # 00d-bootstrap-azure.sh).
    name: Bootstrap ACR (targeted terraform apply)
    needs: [ci, preflight-envs]
    runs-on: ubuntu-latest
    environment: production-bootstrap
    concurrency:
      group: terraform-production-state
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    env:
      # All root-level TF_VAR_* must be set even though the targeted
      # resources don't consume them — Terraform validates the variable
      # surface of the entire root module before honoring -target.
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_BFF_DB_PASSWORD }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_BUSINESS_DB_PASSWORD }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '1.9.8'
          terraform_wrapper: false

      - name: Terraform init + targeted plan/apply (ACR only)
        working-directory: infra/terraform/environments/production
        # `-lock-timeout=5m` absorbs sub-minute blob-lease overlap with the
        # later `apply` job. Plan-then-apply (not `apply -auto-approve`)
        # gives the production approver something concrete to inspect at
        # the `environment: production` gate — the diff is rendered into
        # the run summary BEFORE apply runs. After the first deploy this
        # diff is "0 to add, 0 to change, 0 to destroy" and the approver
        # clicks through; on first deploy it shows the ACR + AcrPush
        # binding being created.
        run: |
          set -euo pipefail
          terraform init -lock-timeout=5m \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform plan -input=false -lock-timeout=5m -out=tfplan-bootstrap.binary \
            -target='module.boatapp.module.container_registry.azurerm_container_registry.this' \
            -target='module.boatapp.module.container_registry.azurerm_role_assignment.acr_push'
          {
            echo "## ACR bootstrap plan (production)"
            echo '```'
            terraform show -no-color tfplan-bootstrap.binary | head -80
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          terraform apply -input=false -lock-timeout=5m tfplan-bootstrap.binary

  build-push:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      image_tag:        ${{ steps.tag.outputs.tag }}
      acr_login_server: ${{ steps.tf-output.outputs.acr_login_server }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        # Production tag = main-<sha8>. Immutable per commit.
        run: echo "tag=main-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Discover ACR login server (from TF state)
        id: tf-output
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          ACR=$(terraform output -raw acr_login_server 2>/dev/null || echo "")
          if [ -z "$ACR" ]; then
            echo "::error::ACR login server not found. Bootstrap production once via terraform apply before pushing images."
            exit 1
          fi
          echo "acr_login_server=${ACR}" >> "$GITHUB_OUTPUT"

      - name: az acr login
        run: az acr login --name "$(echo '${{ steps.tf-output.outputs.acr_login_server }}' | cut -d. -f1)"

      - name: Build & push BFF
        uses: ./.github/actions/docker-build-push
        with:
          context:    .
          dockerfile: bff/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/bff
          tags:       ${{ steps.tag.outputs.tag }}

      - name: Build & push business-service
        uses: ./.github/actions/docker-build-push
        with:
          context:    .
          dockerfile: business-service/Dockerfile
          image:      ${{ steps.tf-output.outputs.acr_login_server }}/business-service
          tags:       ${{ steps.tag.outputs.tag }}

      # Keycloak is NOT built here — App Service pulls the upstream image
      # straight from quay.io. Bump the keycloak_image_tag TF variable
      # (default 26.6.1) via a TF apply when a new Keycloak release is cut.

      # Keycloak is built from keycloak/Dockerfile (NOT pulled from
      # quay.io). The Dockerfile bakes `kc.sh build --db=postgres` into
      # the image so the Container App can launch with `start
      # --optimized` — without the bake the optimized launcher crashes
      # with "Unable to find the database vendor".
      - name: Build & push keycloak image
        id: keycloak_push
        uses: ./.github/actions/docker-build-push
        with:
          # `docker build --file` resolves relative to the workflow's
          # cwd (repo root after actions/checkout), NOT relative to the
          # build context. Pass a repo-rooted path here — same shape as
          # bff/business-service above.
          dockerfile: keycloak/Dockerfile
          image: ${{ env.KEYCLOAK_IMAGE }}
          tags: |
            ${{ env.RELEASE_TAG }}
            latest
            production

      - name: Cosign sign keycloak image
        env:
          IMAGE: ${{ env.KEYCLOAK_IMAGE }}
          DIGEST: ${{ steps.keycloak_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance for keycloak
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-name: ${{ env.KEYCLOAK_IMAGE }}
          subject-digest: ${{ steps.keycloak_push.outputs.digest }}
          push-to-registry: true

  plan:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID:               ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:                      "true"
      TF_VAR_postgres_admin_password:    ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_bff_db_password:            ${{ secrets.TF_VAR_BFF_DB_PASSWORD }}
      TF_VAR_business_db_password:       ${{ secrets.TF_VAR_BUSINESS_DB_PASSWORD }}
      TF_VAR_keycloak_db_password:       ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
      TF_VAR_keycloak_admin_password:    ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
      TF_VAR_ci_push_principal_id:       ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
      TF_VAR_tf_apply_principal_id:      ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
      TF_VAR_bff_image_tag:              ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_business_service_image_tag: ${{ needs.build-push.outputs.image_tag }}
      # Keycloak image tag is pinned in TF (default 26.6.1); no per-deploy override.
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: terraform plan
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform plan -input=false -out=tfplan
          # Compact diff into the run summary so reviewers can see what
          # they're approving without downloading the binary plan.
          {
            echo "## Terraform plan — production"
            echo
            echo '```'
            terraform show -no-color tfplan | head -200
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload tfplan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

  apply:
    needs: [build-push, plan]
    runs-on: ubuntu-latest
    environment: production   # Required Reviewers gate sits on this environment.
    outputs:
      bff_fqdn:                  ${{ steps.outputs.outputs.bff_fqdn }}
      business_service_fqdn:     ${{ steps.outputs.outputs.business_service_fqdn }}
      keycloak_fqdn:             ${{ steps.outputs.outputs.keycloak_fqdn }}
      bff_app_name:              ${{ steps.outputs.outputs.bff_app_name }}
      business_service_app_name: ${{ steps.outputs.outputs.business_service_app_name }}
      keycloak_app_name:         ${{ steps.outputs.outputs.keycloak_app_name }}
      resource_group_name:       ${{ steps.outputs.outputs.resource_group_name }}
    # Re-export the same TF_VAR_* surface as `plan` so an operator can
    # bypass the saved tfplan if the artifact is lost (e.g. by re-running
    # this job manually with `terraform apply -auto-approve`).
    env:
      ARM_SUBSCRIPTION_ID:               ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:                      "true"
      TF_VAR_postgres_admin_password:    ${{ secrets.TF_VAR_POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_bff_db_password:            ${{ secrets.TF_VAR_BFF_DB_PASSWORD }}
      TF_VAR_business_db_password:       ${{ secrets.TF_VAR_BUSINESS_DB_PASSWORD }}
      TF_VAR_keycloak_db_password:       ${{ secrets.TF_VAR_KEYCLOAK_DB_PASSWORD }}
      TF_VAR_keycloak_admin_password:    ${{ secrets.TF_VAR_KEYCLOAK_ADMIN_PASSWORD }}
      TF_VAR_ci_push_principal_id:       ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
      TF_VAR_tf_apply_principal_id:      ${{ secrets.AZURE_CLIENT_OBJECT_ID }}
      TF_VAR_bff_image_tag:              ${{ needs.build-push.outputs.image_tag }}
      TF_VAR_business_service_image_tag: ${{ needs.build-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # No per-run firewall poke needed — see deploy-staging.yml for why.

      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          # download-artifact lays a single-file artifact at this exact
          # path, leaving us with `${TF_DIR}/tfplan` ready for `apply`.
          name: tfplan-production
          path: ${{ env.TF_DIR }}

      - name: terraform apply tfplan
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve tfplan

      - name: Capture outputs
        id: outputs
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          {
            echo "bff_fqdn=$(terraform output -raw bff_fqdn)"
            echo "business_service_fqdn=$(terraform output -raw business_service_fqdn)"
            echo "keycloak_fqdn=$(terraform output -raw keycloak_fqdn)"
            echo "bff_app_name=$(terraform output -raw bff_app_name)"
            echo "business_service_app_name=$(terraform output -raw business_service_app_name)"
            echo "keycloak_app_name=$(terraform output -raw keycloak_app_name)"
            echo "resource_group_name=$(terraform output -raw resource_group_name)"
          } >> "$GITHUB_OUTPUT"

  deploy-app:
    needs: [build-push, apply]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set new image tag on bff + business-service and restart
        env:
          ACR_LOGIN_SERVER: ${{ needs.build-push.outputs.acr_login_server }}
          IMAGE_TAG:        ${{ needs.build-push.outputs.image_tag }}
          RG:               ${{ needs.apply.outputs.resource_group_name }}
          BFF_APP:          ${{ needs.apply.outputs.bff_app_name }}
          BUSINESS_APP:     ${{ needs.apply.outputs.business_service_app_name }}
        run: |
          set -euo pipefail
          # Keycloak is intentionally absent — its image is pinned in TF.
          for app_repo in \
              "${BFF_APP}:bff" \
              "${BUSINESS_APP}:business-service"; do
            APP="${app_repo%%:*}"
            REPO="${app_repo##*:}"
            az webapp config container set \
              --resource-group       "${RG}" \
              --name                 "${APP}" \
              --container-image-name "${ACR_LOGIN_SERVER}/${REPO}:${IMAGE_TAG}" \
              --output none
            az webapp restart \
              --resource-group "${RG}" \
              --name           "${APP}" \
              --output none
          done

  smoke:
    needs: [apply, deploy-app]
    runs-on: ubuntu-latest
    steps:
      - name: Probe BFF /actuator/health
        env:
          BFF_FQDN: ${{ needs.apply.outputs.bff_fqdn }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsSL "https://${BFF_FQDN}/actuator/health" | grep -q '"status":"UP"'; then
              echo "BFF healthy after ${i} attempts."
              exit 0
            fi
            echo "Attempt ${i}: not healthy yet, waiting 10s..."
            sleep 10
          done
          echo "::error::BFF /actuator/health did not return UP within 5 min."
          curl -i "https://${BFF_FQDN}/actuator/health" || true
          exit 1
