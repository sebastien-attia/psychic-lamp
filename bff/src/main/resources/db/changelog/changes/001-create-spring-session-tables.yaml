# Creates SPRING_SESSION and SPRING_SESSION_ATTRIBUTES — the canonical
# Spring Session JDBC schema. `spring.session.jdbc.initialize-schema: never`
# in application.yml prevents Spring from racing this migration.
databaseChangeLog:
  - changeSet:
      id: 001-create-spring-session-tables
      author: boatapp-bff
      changes:
        - createTable:
            tableName: SPRING_SESSION
            columns:
              - column:
                  name: PRIMARY_ID
                  type: CHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: SESSION_ID
                  type: CHAR(36)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: SPRING_SESSION_IX1
              - column:
                  name: CREATION_TIME
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: LAST_ACCESS_TIME
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: MAX_INACTIVE_INTERVAL
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: EXPIRY_TIME
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: PRINCIPAL_NAME
                  type: VARCHAR(100)
        - createIndex:
            indexName: SPRING_SESSION_IX2
            tableName: SPRING_SESSION
            columns:
              - column:
                  name: EXPIRY_TIME
        - createIndex:
            indexName: SPRING_SESSION_IX3
            tableName: SPRING_SESSION
            columns:
              - column:
                  name: PRINCIPAL_NAME
        - createTable:
            tableName: SPRING_SESSION_ATTRIBUTES
            columns:
              - column:
                  name: SESSION_PRIMARY_ID
                  type: CHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: SPRING_SESSION_ATTRIBUTES_FK
                    references: SPRING_SESSION(PRIMARY_ID)
                    deleteCascade: true
              - column:
                  name: ATTRIBUTE_NAME
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: ATTRIBUTE_BYTES
                  type: BYTEA
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: SPRING_SESSION_ATTRIBUTES
            columnNames: SESSION_PRIMARY_ID, ATTRIBUTE_NAME
            constraintName: SPRING_SESSION_ATTRIBUTES_PK
