# .github/workflows/deploy-staging.yml
#
# Auto-deploy to the staging environment on every push to the `staging`
# branch. No manual approval — staging is the safety net for production.
#
# Pipeline order (phase-4b shape — split into 3 jobs):
#   1. Reuse ci.yml end-to-end (lint, secret-scan, container-scan, SCA,
#      build, test, docker sanity, E2E).
#   2. `build-push` — Authenticate to Azure via OIDC federation, run
#      `az acr login`, build/push bff + business-service via the
#      docker-build-push composite action (which now emits image digests),
#      then SIGN each image (cosign keyless, digest-targeted) and produce
#      a SLSA Build L3 provenance attestation pushed back to ACR alongside
#      the image. Tags pushed: `staging` (rolling) and
#      `staging-<short-sha>` (immutable for rollback / debugging).
#   3. `plan` — `terraform init` + `terraform plan -out=tfplan.binary`,
#      render a markdown summary, upload `tfplan-<run_id>` as an artifact
#      so the apply job can consume the *exact* plan that was reviewed.
#   4. `apply` — Carries `environment: staging` so any deployment-protection
#      rule fires AFTER the plan exists. Downloads the artifact, applies it
#      verbatim (no re-plan), runs Ansible post-deploy, smoke-tests the
#      stack, then uploads the BOM to Dependency-Track as the post-deploy
#      receipt (the pre-deploy DT *gate* runs in ci.yml).
#
# Required environment-scoped secrets (GitHub → Settings → Environments →
# staging) — see .github/ENVIRONMENTS.md for full list:
#   TF_VAR_postgres_admin_password
#   TF_VAR_bff_db_password
#   TF_VAR_business_db_password
#   TF_VAR_keycloak_db_password
#   TF_VAR_keycloak_admin_password
#   DTRACK_URL
#   DTRACK_API_KEY

name: Deploy to Staging

on:
  push:
    branches: [staging]

# Least-privilege defaults at workflow scope. Each job widens for itself.
permissions:
  contents: read

# Serialize staging deploys but DO NOT cancel in-flight ones — cancelling
# a `terraform apply` mid-flight risks leaving state mid-mutation.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  ci:
    name: CI (reuse ci.yml)
    uses: ./.github/workflows/ci.yml
    # Reusable workflows do NOT inherit caller secrets by default. Without
    # this, ci.yml's DT gate, gitleaks license, and any other `secrets.*`
    # reference would resolve to empty strings on deploy-triggered runs.
    secrets: inherit
    # The reusable workflow's nested jobs (sca-scan, container-scan) need to
    # upload SARIF and read action metadata. The CALLER job's permissions
    # block is the ceiling for the called workflow's jobs — without raising
    # it here the workflow fails to start with "is requesting
    # security-events: write, but is only allowed security-events: none".
    permissions:
      contents: read
      security-events: write
      actions: read

  build-push:
    # Build + push images, then sign with cosign (keyless OIDC) and emit
    # a SLSA Build L3 provenance attestation.
    name: Build, push, sign
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for `azure/login@v2` + cosign keyless + attestations
      contents: read
      attestations: write   # required by actions/attest-build-provenance
    outputs:
      image_tag_sha: ${{ steps.compute.outputs.image_tag_sha }}
      bff_digest: ${{ steps.bff_push.outputs.digest }}
      business_digest: ${{ steps.business_push.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute image references and tags
        id: compute
        run: |
          set -euo pipefail
          ACR_LOGIN=$(az acr show -n "${{ vars.ACR_NAME }}" --query loginServer -o tsv)
          SHA_TAG="staging-${GITHUB_SHA:0:8}"
          {
            echo "ACR_LOGIN=${ACR_LOGIN}"
            echo "BFF_IMAGE=${ACR_LOGIN}/bff"
            echo "BUSINESS_IMAGE=${ACR_LOGIN}/business-service"
            echo "IMAGE_TAG_SHA=${SHA_TAG}"
          } >> "$GITHUB_ENV"
          echo "image_tag_sha=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      # OIDC-federated ACR token (no admin creds, no docker login -u/-p).
      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      # Cosign installer once at the top of the job — both per-image sign
      # steps reuse the same binary.
      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Build & push bff image
        id: bff_push
        uses: ./.github/actions/docker-build-push
        with:
          dockerfile: bff/Dockerfile
          image: ${{ env.BFF_IMAGE }}
          tags: |
            staging
            ${{ env.IMAGE_TAG_SHA }}

      # Sign the digest, never a tag — tag-signing breaks under any tag
      # mutation (a deliberate `latest` rewrite, a Watchtower-style retag).
      # Keyless: the OIDC token from this workflow run identifies the
      # signer; the certificate + signature go to the public Sigstore
      # transparency log (Rekor).
      - name: Cosign sign bff image
        env:
          IMAGE: ${{ env.BFF_IMAGE }}
          DIGEST: ${{ steps.bff_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance for bff
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-name: ${{ env.BFF_IMAGE }}
          subject-digest: ${{ steps.bff_push.outputs.digest }}
          push-to-registry: true

      - name: Build & push business-service image
        id: business_push
        uses: ./.github/actions/docker-build-push
        with:
          dockerfile: business-service/Dockerfile
          image: ${{ env.BUSINESS_IMAGE }}
          tags: |
            staging
            ${{ env.IMAGE_TAG_SHA }}

      - name: Cosign sign business-service image
        env:
          IMAGE: ${{ env.BUSINESS_IMAGE }}
          DIGEST: ${{ steps.business_push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest SLSA provenance for business-service
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-name: ${{ env.BUSINESS_IMAGE }}
          subject-digest: ${{ steps.business_push.outputs.digest }}
          push-to-registry: true

  plan:
    # Run terraform plan in a job that does NOT carry the environment gate,
    # then upload the binary plan as an artifact so the apply job applies
    # the EXACT plan the reviewer saw.
    name: Terraform plan (staging)
    needs: [build-push]
    runs-on: ubuntu-latest    # public Azure storage backend; VNet-runner out of scope for 4b
    permissions:
      id-token: write
      contents: read
    env:
      # `terraform plan` resolves variables, so even read-only plans need
      # the same TF_VAR_* env vars the apply step uses.
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_postgres_admin_password }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_bff_db_password }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_business_db_password }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_keycloak_db_password }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_keycloak_admin_password }}
      IMAGE_TAG_SHA: ${{ needs.build-push.outputs.image_tag_sha }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '1.9.8'

      - name: Terraform init + plan (staging)
        working-directory: infra/terraform/environments/staging
        run: |
          set -euo pipefail
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform plan -out=tfplan.binary -input=false \
            -var "bff_image_tag=${IMAGE_TAG_SHA}" \
            -var "business_service_image_tag=${IMAGE_TAG_SHA}"
          terraform show -json tfplan.binary > tfplan.json

      - name: Render plan summary
        # `comment-on-pr` is intentionally left at its default; the
        # composite already gates the comment step on `event_name ==
        # 'pull_request'`, so passing 'false' would be redundant here.
        uses: ./.github/actions/terraform-plan-summary
        with:
          plan-json: infra/terraform/environments/staging/tfplan.json

      # Persist the binary plan AND the JSON form. The binary is what
      # apply consumes; the JSON is for the apply-job approver to skim
      # in the run summary, and for human auditing later.
      - name: Upload terraform plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            infra/terraform/environments/staging/tfplan.binary
            infra/terraform/environments/staging/tfplan.json
          retention-days: 90
          if-no-files-found: error

  apply:
    # Apply the EXACT plan from the artifact, then run post-deploy steps
    # (Ansible, smoke health, DT receipt). Carries `environment: staging`
    # so deployment protection rules fire AFTER the plan exists — moving
    # the gate here is the whole point of plan-as-artifact.
    name: Terraform apply + post-deploy (staging)
    needs: [build-push, plan]
    runs-on: ubuntu-latest    # public Azure storage backend; VNet-runner out of scope for 4b
    environment: staging
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_postgres_admin_password: ${{ secrets.TF_VAR_postgres_admin_password }}
      TF_VAR_bff_db_password:         ${{ secrets.TF_VAR_bff_db_password }}
      TF_VAR_business_db_password:    ${{ secrets.TF_VAR_business_db_password }}
      TF_VAR_keycloak_db_password:    ${{ secrets.TF_VAR_keycloak_db_password }}
      TF_VAR_keycloak_admin_password: ${{ secrets.TF_VAR_keycloak_admin_password }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Azure login (OIDC, no client secret)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve federated SP object ID
        env:
          AZ_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          PRINCIPAL_ID=$(az ad sp show --id "${AZ_CLIENT_ID}" --query id -o tsv)
          echo "TF_VAR_ci_push_principal_id=${PRINCIPAL_ID}"  >> "$GITHUB_ENV"
          echo "TF_VAR_tf_apply_principal_id=${PRINCIPAL_ID}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '1.9.8'

      - name: Download tfplan artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tfplan-${{ github.run_id }}
          path: infra/terraform/environments/staging/

      - name: Terraform init + apply (verbatim from artifact)
        working-directory: infra/terraform/environments/staging
        # `apply tfplan.binary` runs the exact plan the reviewer saw —
        # no re-plan, no fresh variable resolution. `-lockfile=readonly`
        # in init makes the apply explode early if the provider lockfile
        # changed between plan and apply (rare, but Dependabot landing
        # a provider bump during the approval window would otherwise
        # surface inside `apply`).
        run: |
          set -euo pipefail
          terraform init -lockfile=readonly \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          terraform apply -input=false -auto-approve tfplan.binary

      # Ansible runs migrate (Liquibase ACA Jobs) → configure (Keycloak
      # realm reconciliation via keycloak-config-cli) → health.
      - name: Setup Ansible
        run: |
          set -euo pipefail
          python -m pip install --upgrade 'pip==24.*'
          pip install 'ansible-core==2.17.*'
      - name: Ansible post-deploy
        working-directory: infra/ansible
        run: |
          ansible-playbook -i inventory/staging.yml playbooks/deploy.yml \
            --tags migrate,configure,health

      - name: Smoke health-check against staging FQDN
        working-directory: infra/terraform/environments/staging
        # `--max-time 5` caps EACH probe so the loop count is meaningful.
        run: |
          set -euo pipefail
          BFF_FQDN=$(terraform output -raw bff_fqdn)
          echo "Polling https://${BFF_FQDN}/actuator/health"
          for i in $(seq 1 30); do
            if curl -sfo /dev/null --max-time 5 "https://${BFF_FQDN}/actuator/health"; then
              echo "  healthy after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "::error::BFF at https://${BFF_FQDN} failed to become healthy after 150s"
          exit 1

      # Post-deploy DT receipt — tags the deployed version. The pre-deploy
      # DT *gate* already ran in ci.yml; this step gives DT a record of
      # what's currently running, separate from "what we tried to ship".
      - uses: ./.github/actions/setup-java
      - name: Download bff SBOM from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bff-sbom
          path: bff/target/
      - name: Download business-service SBOM from CI
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: business-service-sbom
          # Multi-module layout: SBOM lives in the bootstrap submodule's
          # target/ — the dependency-track plugin reads bom.xml from
          # ${project.build.directory} of the bootstrap module.
          path: business-service/bootstrap/target/
      - name: Upload bff SBOM to Dependency-Track
        working-directory: bff
        env:
          DTRACK_URL:     ${{ secrets.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          ./mvnw -B -ntp dependency-track:upload-bom \
            -Ddtrack.skip=false \
            -Ddependency-track.url="${DTRACK_URL}" \
            -Ddependency-track.apiKey="${DTRACK_API_KEY}" \
            -Ddependency-track.projectName=boatapp-bff \
            -Ddependency-track.projectVersion="${GITHUB_SHA}"
      - name: Upload business-service SBOM to Dependency-Track
        working-directory: business-service
        env:
          DTRACK_URL:     ${{ secrets.DTRACK_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          # The dependency-track plugin is declared only in the bootstrap
          # submodule (one runtime artifact, one upload). Scoping with
          # `-pl bootstrap` avoids iterating the other submodules.
          ./mvnw -B -ntp -pl bootstrap dependency-track:upload-bom \
            -Ddtrack.skip=false \
            -Ddependency-track.url="${DTRACK_URL}" \
            -Ddependency-track.apiKey="${DTRACK_API_KEY}" \
            -Ddependency-track.projectName=boatapp-business-service \
            -Ddependency-track.projectVersion="${GITHUB_SHA}"

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## Staging deploy FAILED"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
