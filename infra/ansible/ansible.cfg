# Ansible configuration for the Boat App Azure deployments.
# See infra/ansible/README.md for invocation examples and runner requirements.

[defaults]
inventory               = ./inventory
roles_path              = ./roles
collections_path        = ~/.ansible/collections
host_key_checking       = False
stdout_callback         = yaml
retry_files_enabled     = False
forks                   = 5
deprecation_warnings    = True
interpreter_python      = auto_silent

[privilege_escalation]
become = False
