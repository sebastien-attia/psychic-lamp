spring:
  application:
    name: bff
  profiles:
    # No-profile launches (e.g. plain `mvnw spring-boot:run`, IDE run configs)
    # default to `dev` so Liquibase + datasource autoconfig find a target.
    # Higher environments must set `--spring.profiles.active=…` explicitly.
    default: dev
  session:
    store-type: jdbc
    jdbc:
      # SPRING_SESSION schema is created by the BFF's own Liquibase changelog
      # (see db/changelog/changes/001-create-spring-session-tables.yaml).
      # Keeping Spring Session from auto-initializing avoids a duplicate-create race.
      initialize-schema: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        name: SESSION
        http-only: true
        same-site: lax
        # `secure` defaults to false here so dev / local-intg work over plain HTTP.
        # staging / prod override to `true`.
        secure: false

# Build-time @…@ placeholders are filled by Spring Boot's resource filtering
# (enabled by default in spring-boot-starter-parent). At runtime this surfaces
# the deployed version through GET /actuator/info → {"app":{"name":"bff",
# "version":"1.0.0"}}, so smoke tests / curl can verify what shipped.
info:
  app:
    # Spring placeholder (resolved at runtime) — keeps the wire format
    # symmetrical with the business-service /actuator/info envelope.
    name: ${spring.application.name}
    version: '@project.version@'

management:
  endpoints:
    web:
      exposure:
        # /actuator/health was already public; /actuator/info is added so the
        # version is queryable. SecurityConfig.permitAll() already covers
        # /actuator/health[/**] — /actuator/info needs an additional matcher.
        include: health, info
  info:
    # Required since Spring Boot 2.6 for `info.*` properties to surface
    # through /actuator/info (otherwise the endpoint returns "{}").
    # WHITELIST: only `info.app.{name,version}` are intentionally exposed.
    # `/actuator/info` is permitAll'd in SecurityConfig — adding any new
    # `info.*` key here PUBLISHES it. Never reference secrets/URLs from
    # `info.*`. New entries should land alongside an info-endpoint slice
    # test that pins the expected response shape.
    env:
      enabled: true
